<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QSTORE ZEN — Медитация & Релакс</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        :root {
            --bg-main: #F4F5F9;
            --bg-card: rgba(255, 255, 255, 0.7);
            --text-primary: #1D1D1F;
            --text-secondary: #71717A;
            --border-card: rgba(255, 255, 255, 0.9);
            --shadow-card: 0 4px 20px rgba(0,0,0,0.03);
            --glass-nav-bg: rgba(24, 24, 27, 0.85);
            --glass-nav-border: rgba(255,255,255,0.08);
            --accent: #06B6D4;
            --accent-light: #E0F2FE;
            --gradient-primary: linear-gradient(135deg, #06B6D4 0%, #3B82F6 100%);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-main: #0F0F11;
                --bg-card: rgba(30, 30, 35, 0.75);
                --text-primary: #F4F4F5;
                --text-secondary: #A1A1AA;
                --border-card: rgba(255,255,255,0.05);
                --shadow-card: 0 4px 20px rgba(0,0,0,0.2);
                --glass-nav-bg: rgba(30, 30, 35, 0.9);
                --glass-nav-border: rgba(255,255,255,0.05);
                --accent: #22D3EE;
                --accent-light: #083344;
            }
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-primary);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            margin: 0;
            padding: 0;
            transition: background-color 0.3s, color 0.3s;
        }

        .liquid-glass {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-card);
            box-shadow: var(--shadow-card);
            transition: all 300ms cubic-bezier(0.16, 1, 0.3, 1);
        }

        .liquid-glass-dark {
            background: var(--glass-nav-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-nav-border);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .mesh-background {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: var(--bg-main);
            overflow: hidden;
        }

        .liquid-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.08;
            animation: floatingMesh 20s infinite alternate ease-in-out;
            mix-blend-mode: normal;
        }

        .orb-1 { width: 600px; height: 600px; top: -80px; left: -80px; background: radial-gradient(circle, #06b6d4, transparent 70%); }
        .orb-2 { width: 700px; height: 700px; bottom: -120px; right: -100px; background: radial-gradient(circle, #9333ea, transparent 70%); animation-delay: -7s; }
        .orb-3 { width: 500px; height: 500px; top: 40%; left: 30%; background: radial-gradient(circle, #ec4899, transparent 70%); animation-delay: -14s; }

        @keyframes floatingMesh {
            0% { transform: translate(0, 0) scale(1); opacity: 0.06; }
            50% { transform: translate(40px, -30px) scale(1.1); opacity: 0.1; }
            100% { transform: translate(-20px, 20px) scale(0.95); opacity: 0.06; }
        }

        @keyframes pageEnter {
            0% { opacity: 0; transform: translateY(8px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .page-transition {
            animation: pageEnter 400ms cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .apple-spring {
            transition: all 300ms cubic-bezier(0.16, 1, 0.3, 1);
        }
        .apple-spring:active {
            transform: scale(0.97);
        }

        .scrollbar-none::-webkit-scrollbar { display: none; }
        .scrollbar-none { -ms-overflow-style: none; scrollbar-width: none; }

        @keyframes eqBar {
            0%, 100% { transform: scaleY(0.3); }
            50% { transform: scaleY(1); }
        }
        .eq-bar { animation: eqBar 1.2s ease-in-out infinite; transform-origin: bottom; }

        @keyframes dynamicWave {
            0% { transform: scale(0.95); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 0.15; }
            100% { transform: scale(1.4); opacity: 0; }
        }
        .visual-wave-1 { animation: dynamicWave 6s infinite cubic-bezier(0.25, 1, 0.5, 1); }
        .visual-wave-2 { animation: dynamicWave 6s infinite cubic-bezier(0.25, 1, 0.5, 1); animation-delay: 3s; }

        .safe-bottom { padding-bottom: env(safe-area-inset-bottom, 20px); }
        .safe-top { padding-top: env(safe-area-inset-top, 0px); }
    </style>
</head>
<body class="safe-bottom safe-top">

    <div id="root"></div>

    <div class="mesh-background">
        <div class="liquid-orb orb-1"></div>
        <div class="liquid-orb orb-2"></div>
        <div class="liquid-orb orb-3"></div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // Инициализация Telegram Mini App (необязательно, но добавим для будущих интеграций)
        window.Telegram?.WebApp?.ready();
        window.Telegram?.WebApp?.expand();

        // =================== АУДИО-ДВИЖОК (расширенный) ===================
        const AudioEngine = {
            ctx: null,
            mainGain: null,
            subNodes: [],
            isPlaying: false,
            currentVolume: 0.04,

            init() {
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (this.ctx.state === 'suspended') {
                    this.ctx.resume();
                }
            },

            playAmbient(type, category = "Осознанность") {
                this.init();
                this.stop();
                this.isPlaying = true;

                this.mainGain = this.ctx.createGain();
                this.mainGain.gain.setValueAtTime(this.currentVolume, this.ctx.currentTime);
                this.mainGain.connect(this.ctx.destination);

                const isDeepRelax = (category === "Сон" || category === "Снижение стресса");

                if (type === 'oriental') {
                    const scale = [130.81, 164.81, 196.00, 246.94, 329.63];
                    scale.forEach((freq, idx) => {
                        const osc = this.ctx.createOscillator();
                        osc.type = idx % 2 === 0 ? 'sine' : 'triangle';
                        osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                        const filter = this.ctx.createBiquadFilter();
                        filter.type = 'lowpass';
                        filter.frequency.setValueAtTime(200 + idx * 50, this.ctx.currentTime);
                        const lfo = this.ctx.createOscillator();
                        lfo.type = 'sine';
                        lfo.frequency.setValueAtTime(0.02 + idx * 0.01, this.ctx.currentTime);
                        const lfoGain = this.ctx.createGain();
                        lfoGain.gain.setValueAtTime(0.1, this.ctx.currentTime);
                        const gainNode = this.ctx.createGain();
                        gainNode.gain.setValueAtTime(0.08, this.ctx.currentTime);
                        lfo.connect(lfoGain);
                        lfoGain.connect(gainNode.gain);
                        osc.connect(filter);
                        filter.connect(gainNode);
                        gainNode.connect(this.mainGain);
                        osc.start();
                        lfo.start();
                        this.subNodes.push(osc, filter, lfo, lfoGain, gainNode);
                    });
                }
                else if (type === 'bell') {
                    const frequencies = [174.61, 220.00, 261.63, 329.63, 392.00];
                    frequencies.forEach((freq, idx) => {
                        const osc = this.ctx.createOscillator();
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                        const tremolo = this.ctx.createOscillator();
                        tremolo.type = 'sine';
                        tremolo.frequency.setValueAtTime(0.12 + idx * 0.02, this.ctx.currentTime);
                        const tremoloGain = this.ctx.createGain();
                        tremoloGain.gain.setValueAtTime(0.04, this.ctx.currentTime);
                        const harmonic = this.ctx.createOscillator();
                        harmonic.type = 'sine';
                        harmonic.frequency.setValueAtTime(freq * 2, this.ctx.currentTime);
                        const harmonicGain = this.ctx.createGain();
                        harmonicGain.gain.setValueAtTime(0.02, this.ctx.currentTime);
                        const oscGain = this.ctx.createGain();
                        oscGain.gain.setValueAtTime(0.07, this.ctx.currentTime);
                        tremolo.connect(tremoloGain);
                        tremoloGain.connect(oscGain.gain);
                        osc.connect(oscGain);
                        harmonic.connect(harmonicGain);
                        harmonicGain.connect(this.mainGain);
                        oscGain.connect(this.mainGain);
                        osc.start();
                        tremolo.start();
                        harmonic.start();
                        this.subNodes.push(osc, tremolo, harmonic, tremoloGain, harmonicGain, oscGain);
                    });
                }
                else if (type === 'drone') {
                    const baseFreqs = isDeepRelax ? [55, 82.5, 110, 165] : [65.41, 98, 130.81, 196];
                    baseFreqs.forEach((freq, i) => {
                        const osc = this.ctx.createOscillator();
                        osc.type = i === 0 ? 'sine' : 'triangle';
                        osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                        const filter = this.ctx.createBiquadFilter();
                        filter.type = 'lowpass';
                        filter.frequency.setValueAtTime(200 + i * 30, this.ctx.currentTime);
                        const pan = this.ctx.createStereoPanner();
                        pan.pan.setValueAtTime(i % 2 === 0 ? -0.3 : 0.3, this.ctx.currentTime);
                        const gainNode = this.ctx.createGain();
                        gainNode.gain.setValueAtTime(0.08, this.ctx.currentTime);
                        osc.connect(filter);
                        filter.connect(pan);
                        pan.connect(gainNode);
                        gainNode.connect(this.mainGain);
                        osc.start();
                        this.subNodes.push(osc, filter, pan, gainNode);
                    });
                }
                else if (type === 'waves') {
                    const bufferSize = 4 * this.ctx.sampleRate;
                    const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                    const data = buffer.getChannelData(0);
                    let lastOut = 0;
                    for (let i = 0; i < bufferSize; i++) {
                        const white = Math.random() * 2 - 1;
                        data[i] = (lastOut + (0.02 * white)) / 1.02;
                        lastOut = data[i];
                        data[i] *= 3.5;
                    }
                    const noiseSource = this.ctx.createBufferSource();
                    noiseSource.buffer = buffer;
                    noiseSource.loop = true;
                    const filter = this.ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.setValueAtTime(400, this.ctx.currentTime);
                    const lfo = this.ctx.createOscillator();
                    lfo.type = 'sine';
                    lfo.frequency.setValueAtTime(0.1, this.ctx.currentTime);
                    const lfoGain = this.ctx.createGain();
                    lfoGain.gain.setValueAtTime(200, this.ctx.currentTime);
                    const noiseGain = this.ctx.createGain();
                    noiseGain.gain.setValueAtTime(0.5, this.ctx.currentTime);
                    lfo.connect(lfoGain);
                    lfoGain.connect(filter.frequency);
                    noiseSource.connect(filter);
                    filter.connect(noiseGain);
                    noiseGain.connect(this.mainGain);
                    noiseSource.start();
                    lfo.start();
                    this.subNodes.push(noiseSource, lfo, filter, lfoGain, noiseGain);
                }
                else if (type === 'rain') {
                    const bufferSize = 2 * this.ctx.sampleRate;
                    const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                    const data = buffer.getChannelData(0);
                    for (let i = 0; i < bufferSize; i++) {
                        data[i] = Math.random() * 2 - 1;
                    }
                    const noiseSource = this.ctx.createBufferSource();
                    noiseSource.buffer = buffer;
                    noiseSource.loop = true;
                    const filter = this.ctx.createBiquadFilter();
                    filter.type = 'bandpass';
                    filter.frequency.setValueAtTime(800, this.ctx.currentTime);
                    filter.Q.setValueAtTime(0.5, this.ctx.currentTime);
                    const gainNode = this.ctx.createGain();
                    gainNode.gain.setValueAtTime(0.7, this.ctx.currentTime);
                    noiseSource.connect(filter);
                    filter.connect(gainNode);
                    gainNode.connect(this.mainGain);
                    noiseSource.start();
                    this.subNodes.push(noiseSource, filter, gainNode);
                }
                else if (type === 'forest') {
                    // Птицы + ветер (упрощённо)
                    const osc = this.ctx.createOscillator();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(800, this.ctx.currentTime);
                    const lfo = this.ctx.createOscillator();
                    lfo.type = 'sine';
                    lfo.frequency.setValueAtTime(5, this.ctx.currentTime);
                    const lfoGain = this.ctx.createGain();
                    lfoGain.gain.setValueAtTime(200, this.ctx.currentTime);
                    const gainNode = this.ctx.createGain();
                    gainNode.gain.setValueAtTime(0.1, this.ctx.currentTime);
                    lfo.connect(lfoGain);
                    lfoGain.connect(osc.frequency);
                    osc.connect(gainNode);
                    gainNode.connect(this.mainGain);
                    osc.start();
                    lfo.start();
                    this.subNodes.push(osc, lfo, lfoGain, gainNode);
                }
                else if (type === 'fire') {
                    const bufferSize = 2 * this.ctx.sampleRate;
                    const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                    const data = buffer.getChannelData(0);
                    for (let i = 0; i < bufferSize; i++) {
                        data[i] = (Math.random() * 2 - 1) * 0.3;
                    }
                    const noiseSource = this.ctx.createBufferSource();
                    noiseSource.buffer = buffer;
                    noiseSource.loop = true;
                    const filter = this.ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.setValueAtTime(300, this.ctx.currentTime);
                    const gainNode = this.ctx.createGain();
                    gainNode.gain.setValueAtTime(0.8, this.ctx.currentTime);
                    noiseSource.connect(filter);
                    filter.connect(gainNode);
                    gainNode.connect(this.mainGain);
                    noiseSource.start();
                    this.subNodes.push(noiseSource, filter, gainNode);
                }
            },

            stop() {
                this.subNodes.forEach(node => {
                    try { node.stop(); } catch(e) {}
                    try { node.disconnect(); } catch(e) {}
                });
                if (this.mainGain) {
                    try { this.mainGain.disconnect(); } catch(e) {}
                    this.mainGain = null;
                }
                this.subNodes = [];
                this.isPlaying = false;
            },

            setVolume(volume) {
                this.currentVolume = volume;
                if (this.mainGain) {
                    this.mainGain.gain.setValueAtTime(volume, this.ctx.currentTime);
                }
            }
        };

        // =================== КОНСТАНТЫ И ДАННЫЕ ===================
        const VOICE_FILES = [
            "audio/voice_1.mp3",
            "audio/voice_2.mp3",
            "audio/voice_3.mp3",
            "audio/voice_4.mp3"
        ];

        // Полный набор звуков
        const SOUND_NAMES = {
            oriental: '🏮 Восток',
            bell: '🔔 Чаши',
            drone: '🪐 Космос',
            waves: '🌊 Океан',
            rain: '🌧 Дождь',
            forest: '🌲 Лес',
            fire: '🔥 Костёр',
            wind: '💨 Ветер'
        };

        // Мотивирующие сообщения
        const MOTIVATIONAL_MESSAGES = [
            "Каждый проданный девайс делает мир вокруг технологичнее и чище! ✨",
            "Клиенты чувствуют твою уверенность. Выдохни, улыбнись и взорви эту смену! 💪",
            "Заряжай устройства на витрине и вовремя заряжай свой внутренний аккумулятор. 🔋",
            "Премиальный сервис QSTORE начинается с твоего личного внутреннего спокойствия. 🧘"
        ];

        // Все сессии с привязанным типом звука по умолчанию
        const ALL_SESSIONS = [
            { id: 1, title: "Восточное созерцание", duration: 10, category: "Осознанность", sound: "oriental", url: "https://ice1.somafm.com/suburbsofgoa-128-mp3" },
            { id: 2, title: "Тибетские чаши и покой", duration: 15, category: "Осознанность", sound: "bell", url: "https://ice1.somafm.com/dronezone-128-mp3" },
            { id: 3, title: "Мягкий Дзен-Эмбиент", duration: 12, category: "Осознанность", sound: "forest", url: "" },
            { id: 4, title: "Космический штиль", duration: 30, category: "Сон", sound: "drone", url: "https://ice1.somafm.com/deepspaceone-128-mp3" },
            { id: 5, title: "Колыбельная дождя", duration: 25, category: "Сон", sound: "rain", url: "" },
            { id: 6, title: "Разгрузка после клиентов", duration: 15, category: "Снижение стресса", sound: "fire", url: "" },
            { id: 7, title: "Растворение тревоги", duration: 10, category: "Снижение стресса", sound: "bell", url: "" },
            { id: 8, title: "Глубокий фокус", duration: 25, category: "Фокус и концентрация", sound: "drone", url: "" },
            { id: 9, title: "Баланс QSTORE", duration: 15, category: "Благодарность", sound: "oriental", url: "" },
            { id: 10, title: "Экспресс-релакс", duration: 5, category: "Быстрое расслабление", sound: "waves", url: "" }
        ];

        const DIRECTIONS = [
            { id: "mind", title: "Осознанность", icon: "✦", color: "text-blue-500", bg: "bg-blue-500/10" },
            { id: "sleep", title: "Сон", icon: "☾", color: "text-purple-500", bg: "bg-purple-500/10" },
            { id: "stress", title: "Антистресс", icon: "❖", color: "text-emerald-500", bg: "bg-emerald-500/10" },
            { id: "focus", title: "Фокус", icon: "⬡", color: "text-pink-500", bg: "bg-pink-500/10" },
            { id: "breath", title: "Дыхание", icon: "💨", color: "text-sky-500", bg: "bg-sky-500/10", isSpecial: true },
            { id: "gratitude", title: "Благодарность", icon: "♥", color: "text-rose-500", bg: "bg-rose-500/10" },
            { id: "quick", title: "Быстрый релакс", icon: "⏳", color: "text-cyan-500", bg: "bg-cyan-500/10" }
        ];

        // =================== КОМПОНЕНТЫ ===================
        function DynamicTicker() {
            const [currentIndex, setCurrentIndex] = useState(0);
            useEffect(() => {
                const interval = setInterval(() => {
                    setCurrentIndex((prev) => (prev + 1) % MOTIVATIONAL_MESSAGES.length);
                }, 6000);
                return () => clearInterval(interval);
            }, []);

            return (
                <div className="w-full text-center px-2">
                    <div className="text-xs font-semibold italic py-3 px-5 rounded-2xl border text-zinc-500 dark:text-zinc-300 bg-white/70 dark:bg-zinc-800/70 border-white/90 dark:border-zinc-700/50 backdrop-blur-md shadow-sm">
                        ✨ {MOTIVATIONAL_MESSAGES[currentIndex]}
                    </div>
                </div>
            );
        }

        // =================== НОВАЯ НИЖНЯЯ ПАНЕЛЬ НАВИГАЦИИ ===================
        function BottomNav({ currentTab, setCurrentTab }) {
            return (
                <nav className="fixed bottom-6 left-1/2 -translate-x-1/2 z-40 w-[85%] max-w-sm">
                    <div className="liquid-glass-dark rounded-[30px] p-1 flex items-center shadow-2xl backdrop-blur-xl">
                        <button 
                            onClick={() => setCurrentTab('dashboard')}
                            className={`flex-1 flex items-center justify-center gap-2 py-3 rounded-[24px] font-bold text-sm transition-all duration-300 ${
                                currentTab === 'dashboard' 
                                    ? 'text-cyan-400 bg-white/10 shadow-inner' 
                                    : 'text-zinc-400 hover:text-zinc-200'
                            }`}
                        >
                            <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                                <path strokeLinecap="round" strokeLinejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                            </svg>
                            <span className="hidden sm:inline">Главная</span>
                        </button>
                        <button 
                            onClick={() => setCurrentTab('breathwork')}
                            className={`flex-1 flex items-center justify-center gap-2 py-3 rounded-[24px] font-bold text-sm transition-all duration-300 ${
                                currentTab === 'breathwork' 
                                    ? 'text-cyan-400 bg-white/10 shadow-inner' 
                                    : 'text-zinc-400 hover:text-zinc-200'
                            }`}
                        >
                            <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                                <path strokeLinecap="round" strokeLinejoin="round" d="M12 6v6m0 0v6m0-6h6m-6 0H6" />
                            </svg>
                            <span className="hidden sm:inline">Дыхание</span>
                        </button>
                    </div>
                </nav>
            );
        }

        // =================== ГЛАВНОЕ ПРИЛОЖЕНИЕ ===================
        function PremiumZenApp() {
            const [currentTab, setCurrentTab] = useState('dashboard');
            const [selectedCategoryFilter, setSelectedCategoryFilter] = useState(null);
            const [activePlayerSession, setActivePlayerSession] = useState(null);
            const [userStreak, setUserStreak] = useState(4);
            const [userTotalMinutes, setUserTotalMinutes] = useState(75);

            const handleQuickStart = useCallback(() => {
                const available = selectedCategoryFilter 
                    ? ALL_SESSIONS.filter(s => s.category === selectedCategoryFilter) 
                    : ALL_SESSIONS;
                const randomTrack = available[Math.floor(Math.random() * available.length)];
                setActivePlayerSession(randomTrack);
            }, [selectedCategoryFilter]);

            return (
                <div className="min-h-screen pb-40 pt-6 px-4 max-w-xl mx-auto relative flex flex-col justify-between">
                    <div key={currentTab} className="flex-1 page-transition">
                        {currentTab === 'dashboard' && (
                            <DashboardView 
                                streak={userStreak} 
                                totalMinutes={userTotalMinutes} 
                                activeCategory={selectedCategoryFilter} 
                                setActiveCategory={setSelectedCategoryFilter}
                                onStart={(s) => setActivePlayerSession(s)}
                                onQuickStart={handleQuickStart}
                                setTab={setCurrentTab}
                            />
                        )}
                        {currentTab === 'breathwork' && <BreathworkView />}
                    </div>

                    <DynamicTicker />

                    <footer className="w-full text-center py-6 mt-4 border-t border-zinc-200/40 dark:border-zinc-700/30">

        // =================== ДЫХАТЕЛЬНАЯ ПРАКТИКА (С МУЗЫКОЙ) ===================
        function BreathworkView() {
            const [phase, setPhase] = useState('Вдох');
            const [timer, setTimer] = useState(4);
            const [active, setActive] = useState(false);
            const [cycles, setCycles] = useState(0);
            const [musicType, setMusicType] = useState('oriental'); // фоновая музыка для дыхания

            useEffect(() => {
                return () => { AudioEngine.stop(); };
            }, []);

            useEffect(() => {
                let interval = null;
                if (active) {
                    interval = setInterval(() => {
                        setTimer(t => {
                            if (t <= 1) {
                                setPhase(p => p === 'Вдох' ? 'Задержка' : p === 'Задержка' ? 'Выдох' : 'Вдох');
                                if (phase === 'Выдох') setCycles(c => c + 1);
                                return 4;
                            }
                            return t - 1;
                        });
                    }, 1000);
                } else {
                    setPhase('Вдох');
                    setTimer(4);
                    setCycles(0);
                }
                return () => clearInterval(interval);
            }, [active, phase]);

            const togglePractice = useCallback(() => {
                setActive(prev => {
                    const next = !prev;
                    if (next) {
                        AudioEngine.playAmbient(musicType, 'Дыхательные практики');
                        AudioEngine.setVolume(0.03);
                    } else {
                        AudioEngine.stop();
                    }
                    return next;
                });
            }, [musicType]);

            return (
                <div className="max-w-md mx-auto text-center space-y-8 pt-6 page-transition">
                    <div className="space-y-2">
                        <h2 className="text-2xl font-black text-zinc-900 dark:text-white">Антистресс-дыхание</h2>
                        <p className="text-xs text-zinc-500 dark:text-zinc-400 font-medium">Квадратное дыхание 4×4</p>
                    </div>

                    <div className="liquid-glass bg-white/70 dark:bg-zinc-800/70 rounded-[40px] aspect-square max-w-[280px] mx-auto flex flex-col justify-center items-center relative shadow-md">
                        {active && (
                            <>
                                <div className="absolute inset-4 rounded-[32px] bg-cyan-400/10 dark:bg-cyan-400/5 blur-xl visual-wave-1 pointer-events-none" />
                                <div className="absolute inset-4 rounded-[32px] bg-indigo-400/10 dark:bg-indigo-400/5 blur-xl visual-wave-2 pointer-events-none" />
                            </>
                        )}
                        <h3 className="text-lg font-bold z-10 text-zinc-800 dark:text-zinc-200">
                            {active ? phase : 'Нажми старт'}
                        </h3>
                        <div className="text-5xl font-light mt-4 z-10 tabular-nums text-zinc-900 dark:text-white">
                            {timer}с
                        </div>
                        {active && (
                            <div className="mt-4 z-10">
                                <span className="text-xs font-medium text-zinc-400 dark:text-zinc-500">
                                    Циклов: {cycles}
                                </span>
                            </div>
                        )}
                    </div>

                    {/* Выбор фоновой музыки для дыхания */}
                    <div className="bg-white/80 dark:bg-zinc-800/80 rounded-2xl p-4 border border-white/50 dark:border-zinc-700/30 max-w-[280px] mx-auto">
                        <span className="text-[10px] font-extrabold text-zinc-400 dark:text-zinc-500 uppercase tracking-wider mb-2 block">Фоновая музыка</span>
                        <div className="grid grid-cols-3 gap-2">
                            {['oriental', 'bell', 'rain', 'forest', 'fire', 'drone'].map(type => (
                                <button
                                    key={type}
                                    onClick={() => { setMusicType(type); if(active) { AudioEngine.stop(); AudioEngine.playAmbient(type, 'Дыхательные практики'); } }}
                                    className={`text-[11px] font-bold py-2 px-1 rounded-xl border transition-all ${
                                        musicType === type 
                                            ? 'bg-zinc-900 dark:bg-zinc-200 text-white dark:text-zinc-900 border-zinc-900 dark:border-zinc-200'
                                            : 'bg-zinc-100 dark:bg-zinc-700 text-zinc-600 dark:text-zinc-300 border-transparent'
                                    }`}
                                >
                                    {SOUND_NAMES[type]}
                                </button>
                            ))}
                        </div>
                    </div>

                    <button 
                        onClick={togglePractice} 
                        className="w-full max-w-[240px] py-4 bg-gradient-to-r from-zinc-950 to-zinc-900 dark:from-zinc-200 dark:to-zinc-300 text-white dark:text-zinc-900 rounded-full font-bold shadow-lg apple-spring text-sm uppercase tracking-wider mx-auto block"
                    >
                        {active ? 'Остановить практику' : 'Начать практику'}
                    </button>
                </div>
            );
        }

        // =================== ПЛЕЕР МЕДИТАЦИИ ===================
        function MeditationPlayerScreen({ session, onClose, onComplete }) {
            const [isPlaying, setIsPlaying] = useState(true);
            const [secondsRemaining, setSecondsRemaining] = useState(session.duration * 60);
            const [isVoiceEnabled, setIsVoiceEnabled] = useState(true);
            const [soundType, setSoundType] = useState(session.sound || 'oriental');
            const [volume, setVolume] = useState(0.04);

            const voiceAudioRef = useRef(null);
            const streamMusicRef = useRef(null);
            const currentVoiceIdxRef = useRef(0);
            const voiceCooldownRef = useRef(5);
            const isVoicePlayingRef = useRef(false);
            const speechDurationCounterRef = useRef(0);
            const completedRef = useRef(false);

            const totalSeconds = session.duration * 60;
            const elapsedSeconds = totalSeconds - secondsRemaining;

            useEffect(() => {
                AudioEngine.init();
                voiceAudioRef.current = new Audio();
                voiceAudioRef.current.volume = 0.45;
                const handleVoiceEnded = () => {
                    isVoicePlayingRef.current = false;
                    speechDurationCounterRef.current = 0;
                    voiceCooldownRef.current = 45;
                };
                voiceAudioRef.current.addEventListener('ended', handleVoiceEnded);

                if (session.url) {
                    streamMusicRef.current = new Audio(session.url);
                    streamMusicRef.current.loop = true;
                    streamMusicRef.current.volume = 0.03;
                    streamMusicRef.current.play().catch(() => {});
                }

                AudioEngine.playAmbient(soundType, session.category);
                AudioEngine.setVolume(volume);

                return () => {
                    if (voiceAudioRef.current) {
                        voiceAudioRef.current.pause();
                        voiceAudioRef.current.removeEventListener('ended', handleVoiceEnded);
                    }
                    if (streamMusicRef.current) {
                        streamMusicRef.current.pause();
                        streamMusicRef.current.src = '';
                    }
                    AudioEngine.stop();
                };
            }, []);

            useEffect(() => {
                if (isPlaying) {
                    AudioEngine.playAmbient(soundType, session.category);
                    AudioEngine.setVolume(volume);
                    if (streamMusicRef.current) streamMusicRef.current.play().catch(() => {});
                } else {
                    AudioEngine.stop();
                    if (voiceAudioRef.current) voiceAudioRef.current.pause();
                    if (streamMusicRef.current) streamMusicRef.current.pause();
                }
            }, [isPlaying, soundType, volume]);

            useEffect(() => {
                if (!isVoiceEnabled && voiceAudioRef.current) {
                    voiceAudioRef.current.pause();
                    isVoicePlayingRef.current = false;
                    speechDurationCounterRef.current = 0;
                    voiceCooldownRef.current = 5;
                }
            }, [isVoiceEnabled]);

            useEffect(() => {
                let sessionTimer = null;
                if (isPlaying && secondsRemaining > 0) {
                    sessionTimer = setInterval(() => {
                        if (isVoiceEnabled) {
                            if (isVoicePlayingRef.current) {
                                speechDurationCounterRef.current += 1;
                                if (speechDurationCounterRef.current >= 20) {
                                    if (voiceAudioRef.current) voiceAudioRef.current.pause();
                                    isVoicePlayingRef.current = false;
                                    speechDurationCounterRef.current = 0;
                                    voiceCooldownRef.current = 50;
                                }
                            } else {
                                if (voiceCooldownRef.current > 0) {
                                    voiceCooldownRef.current -= 1;
                                } else {
                                    if (voiceAudioRef.current) {
                                        voiceAudioRef.current.src = VOICE_FILES[currentVoiceIdxRef.current];
                                        voiceAudioRef.current.load();
                                        voiceAudioRef.current.play().then(() => {
                                            isVoicePlayingRef.current = true;
                                            speechDurationCounterRef.current = 0;
                                            currentVoiceIdxRef.current = (currentVoiceIdxRef.current + 1) % VOICE_FILES.length;
                                        }).catch(e => console.log("Voice play prevented", e));
                                    }
                                }
                            }
                        }

                        if (secondsRemaining <= 1) {
                            if (!completedRef.current) {
                                completedRef.current = true;
                                AudioEngine.stop();
                                if (voiceAudioRef.current) voiceAudioRef.current.pause();
                                if (streamMusicRef.current) streamMusicRef.current.pause();
                                onComplete(session.duration);
                            }
                        } else {
                            setSecondsRemaining(prev => prev - 1);
                        }
                    }, 1000);
                }
                return () => clearInterval(sessionTimer);
            }, [isPlaying, isVoiceEnabled, secondsRemaining]);

            const formatTime = (secs) => {
                const m = Math.floor(secs / 60);
                const s = String(secs % 60).padStart(2, '0');
                return `${m}:${s}`;
            };

            const progressPercentage = (elapsedSeconds / totalSeconds) * 100;

            const handleClose = () => {
                AudioEngine.stop();
                if (voiceAudioRef.current) voiceAudioRef.current.pause();
                if (streamMusicRef.current) { streamMusicRef.current.pause(); streamMusicRef.current.src = ''; }
                onClose();
            };

            const handleComplete = () => {
                if (!completedRef.current) {
                    completedRef.current = true;
                    AudioEngine.stop();
                    if (voiceAudioRef.current) voiceAudioRef.current.pause();
                    if (streamMusicRef.current) { streamMusicRef.current.pause(); streamMusicRef.current.src = ''; }
                    onComplete(session.duration);
                }
            };

            return (
                <div className="fixed inset-0 z-50 bg-[var(--bg-main)]/95 backdrop-blur-2xl flex flex-col justify-between p-6 text-center page-transition overflow-y-auto scrollbar-none">
                    <div className="player-neon-container">
                        <div className="absolute inset-0 overflow-hidden pointer-events-none">
                            <div className="absolute w-[400px] h-[400px] top-[-60px] left-[-80px] bg-radial-gradient(circle, rgba(6,182,212,0.25), transparent 70%) blur-[80px] animate-neon1"></div>
                            <div className="absolute w-[450px] h-[450px] bottom-[-80px] right-[-80px] bg-radial-gradient(circle, rgba(147,51,234,0.2), transparent 70%) blur-[90px] animate-neon2"></div>
                            <div className="absolute w-[350px] h-[350px] top-[30%] left-[15%] bg-radial-gradient(circle, rgba(16,185,129,0.15), transparent 70%) blur-[80px] animate-neon3"></div>
                        </div>
                    </div>

                    <div className="flex items-center justify-between w-full max-w-md mx-auto shrink-0 px-2 relative z-10">
                        <button onClick={handleClose} className="bg-zinc-200/80 dark:bg-zinc-700/80 text-zinc-900 dark:text-zinc-100 px-5 py-2.5 rounded-full text-xs font-bold apple-spring hover:bg-zinc-300/80 dark:hover:bg-zinc-600/80">Назад</button>
                        <div className="text-center truncate max-w-[180px]">
                            <h2 className="font-extrabold text-zinc-900 dark:text-white text-sm truncate">{session.title}</h2>
                            <span className="text-[9px] font-bold text-cyan-600 dark:text-cyan-400 block mt-0.5">{session.category}</span>
                        </div>
                        <button onClick={handleComplete} className="bg-zinc-900 dark:bg-zinc-200 text-white dark:text-zinc-900 px-5 py-2.5 rounded-full text-xs font-bold apple-spring hover:bg-zinc-800 dark:hover:bg-zinc-300">Готово</button>
                    </div>

                    <div className="flex-1 flex flex-col items-center justify-center relative my-6 min-h-[200px] z-10">
                        {isPlaying && <div className="absolute w-64 h-64 rounded-full bg-gradient-to-tr from-cyan-400/10 to-emerald-500/10 dark:from-cyan-400/5 dark:to-emerald-500/5 blur-xl visual-wave-1 pointer-events-none" />}
                        <div className="w-44 h-44 rounded-full liquid-glass bg-white/80 dark:bg-zinc-800/80 flex flex-col items-center justify-center shadow-md border border-white/50 dark:border-zinc-700/30 z-10 relative">
                            <span className="text-4xl font-light tabular-nums text-zinc-900 dark:text-white">{formatTime(secondsRemaining)}</span>
                            {isPlaying && (
                                <div className="flex items-end gap-1.5 h-6 mt-3">
                                    <div className="w-1 bg-emerald-400 rounded-full eq-bar eq-slow" style={{height: '100%'}}></div>
                                    <div className="w-1 bg-cyan-400 rounded-full eq-bar" style={{height: '60%', animationDelay: '0.2s'}}></div>
                                    <div className="w-1 bg-teal-500 rounded-full eq-bar eq-slow" style={{height: '40%', animationDelay: '0.4s'}}></div>
                                </div>
                            )}
                        </div>
                    </div>

                    <div className="w-full max-w-sm mx-auto space-y-4 shrink-0 relative z-10">
                        <div className="space-y-1">
                            <div className="w-full bg-black/[0.06] dark:bg-white/[0.1] rounded-full h-1.5 overflow-hidden">
                                <div style={{ width: `${progressPercentage}%` }} className="bg-gradient-to-r from-cyan-500 to-emerald-500 h-full rounded-full transition-all duration-300 ease-out" />
                            </div>
                            <div className="flex justify-between text-[11px] font-medium text-zinc-400 dark:text-zinc-500 tracking-tight px-0.5 select-none">
                                <span>{formatTime(elapsedSeconds)}</span>
                                <span>{formatTime(totalSeconds)}</span>
                            </div>
                        </div>

                        <div className="flex items-center justify-center">
                            <button onClick={() => setIsPlaying(!isPlaying)} className="w-16 h-16 rounded-full bg-gradient-to-r from-zinc-950 to-zinc-900 dark:from-zinc-200 dark:to-zinc-300 text-white dark:text-zinc-900 flex items-center justify-center shadow-lg hover:scale-105 active:scale-95 transition-transform">
                                {isPlaying ? (
                                    <svg className="w-6 h-6 fill-current" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                                ) : (
                                    <svg className="w-6 h-6 fill-current ml-0.5" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                                )}
                            </button>
                        </div>

                        <div className="bg-white/90 dark:bg-zinc-800/90 border border-zinc-200/60 dark:border-zinc-700/40 rounded-3xl p-5 space-y-4 shadow-sm text-left backdrop-blur-md">
                            <div>
                                <span className="block text-[9px] font-black text-zinc-400 dark:text-zinc-500 uppercase tracking-wider mb-2.5">Фоновый звук</span>
                                <div className="grid grid-cols-2 gap-1.5 text-[11px] font-bold">
                                    {['oriental', 'bell', 'drone', 'waves', 'rain', 'forest', 'fire'].map((snd) => {
                                        const isSelected = soundType === snd;
                                        return (
                                            <button 
                                                key={snd} 
                                                onClick={() => setSoundType(snd)} 
                                                className={`py-2.5 px-2 rounded-xl transition-all flex items-center justify-center gap-1 border active:scale-95 ${
                                                    isSelected 
                                                        ? 'bg-zinc-900 dark:bg-zinc-200 text-white dark:text-zinc-900 border-zinc-900 dark:border-zinc-200 shadow-sm font-black' 
                                                        : 'bg-zinc-100 dark:bg-zinc-700 text-zinc-600 dark:text-zinc-300 border-transparent hover:bg-zinc-200 dark:hover:bg-zinc-600'
                                                }`}
                                            >
                                                {SOUND_NAMES[snd]}
                                            </button>
                                        );
                                    })}
                                </div>
                            </div>

                            <div>
                                <span className="block text-[9px] font-black text-zinc-400 dark:text-zinc-500 uppercase tracking-wider mb-2">Громкость фона</span>
                                <input 
                                    type="range" 
                                    min="0" max="0.1" step="0.01" value={volume} 
                                    onChange={(e) => { setVolume(parseFloat(e.target.value)); AudioEngine.setVolume(parseFloat(e.target.value)); }} 
                                    className="w-full h-1 bg-zinc-200 dark:bg-zinc-600 rounded-full appearance-none cursor-pointer accent-cyan-500"
                                />
                            </div>

                            <div className="pt-3 border-t border-zinc-100 dark:border-zinc-700 flex items-center justify-between">
                                <span className="text-xs font-bold text-zinc-800 dark:text-zinc-200">Голосовой гид</span>
                                <button 
                                    onClick={() => setIsVoiceEnabled(!isVoiceEnabled)} 
                                    className={`relative inline-flex h-5 w-10 items-center rounded-full transition-colors duration-300 ${isVoiceEnabled ? 'bg-emerald-500' : 'bg-zinc-200 dark:bg-zinc-600'}`}
                                >
                                    <span className={`inline-block h-3 w-3 transform rounded-full bg-white transition-transform duration-300 ${isVoiceEnabled ? 'translate-x-6' : 'translate-x-1'}`} />
                                </button>
                            </div>
                        </div>
                    </div>

                    <div className="mt-4 shrink-0 max-w-sm mx-auto w-full relative z-10">
                        <DynamicTicker />
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PremiumZenApp />);
    </script>
</body>
</html>
