<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QSTORE ZEN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #F4F5F9;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            color: #1D1D1F;
        }
        .liquid-glass {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02), inset 0 1px 2px rgba(255, 255, 255, 0.9);
            transition: all 400ms cubic-bezier(0.16, 1, 0.3, 1);
        }
        .liquid-glass-dark {
            background: rgba(24, 24, 27, 0.9);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }
        
        .mesh-background {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: #F2F4F8;
            overflow: hidden;
        }
        .liquid-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(130px);
            mix-blend-mode: multiply;
            opacity: 0.14;
            animation: floatingMesh 18s infinite alternate ease-in-out;
        }
        .orb-1 { width: 700px; height: 700px; top: -100px; left: -100px; background: radial-gradient(circle, #06b6d4 0%, rgba(255,255,255,0) 70%); }
        .orb-2 { width: 800px; height: 800px; bottom: -150px; right: -100px; background: radial-gradient(circle, #9333ea 0%, rgba(255,255,255,0) 70%); animation-delay: -5s; }
        .orb-3 { width: 600px; height: 600px; top: 35%; left: 25%; background: radial-gradient(circle, #ec4899 0%, rgba(255,255,255,0) 70%); animation-delay: -10s; }
        
        @keyframes floatingMesh {
            0% { transform: translate(0, 0) scale(1); filter: blur(130px); opacity: 0.12; }
            50% { transform: translate(60px, -50px) scale(1.1); filter: blur(150px); opacity: 0.18; }
            100% { transform: translate(-30px, 30px) scale(0.95); filter: blur(130px); opacity: 0.12; }
        }

        @keyframes pageEnter {
            0% { opacity: 0; transform: scale(0.99) translateY(12px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        .page-transition {
            animation: pageEnter 550ms cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes neonMoving1 {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); }
            50% { transform: translate(45px, 35px) scale(1.15) rotate(90deg); }
            100% { transform: translate(-25px, -15px) scale(0.95) rotate(180deg); }
        }
        @keyframes neonMoving2 {
            0% { transform: translate(0, 0) scale(1.1) rotate(0deg); }
            50% { transform: translate(-40px, -45px) scale(0.9) rotate(-120deg); }
            100% { transform: translate(25px, 25px) scale(1.05) rotate(360deg); }
        }
        .player-neon-container {
            position: absolute;
            inset: 0;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }
        .player-neon-orb-1 {
            position: absolute; width: 450px; height: 450px; top: -80px; left: -100px;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.28) 0%, rgba(255, 255, 255, 0) 70%);
            filter: blur(90px); animation: neonMoving1 15s infinite alternate ease-in-out;
        }
        .player-neon-orb-2 {
            position: absolute; width: 500px; height: 500px; bottom: -100px; right: -100px;
            background: radial-gradient(circle, rgba(147, 51, 234, 0.22) 0%, rgba(255, 255, 255, 0) 70%);
            filter: blur(100px); animation: neonMoving2 19s infinite alternate ease-in-out;
        }
        .player-neon-orb-3 {
            position: absolute; width: 380px; height: 380px; top: 30%; left: 10%;
            background: radial-gradient(circle, rgba(16, 185, 129, 0.18) 0%, rgba(255, 255, 255, 0) 70%);
            filter: blur(90px); animation: neonMoving1 22s infinite alternate-reverse ease-in-out;
        }

        .apple-spring {
            transition: all 400ms cubic-bezier(0.16, 1, 0.3, 1);
        }
        .apple-spring:hover { transform: translateY(-2px); }
        .apple-spring:active { transform: scale(0.96); }
        
        @keyframes dynamicWave {
            0% { transform: scale(0.9); opacity: 0.4; }
            50% { transform: scale(1.3); opacity: 0.15; }
            100% { transform: scale(1.6); opacity: 0; }
        }
        .visual-wave-1 { animation: dynamicWave 5s infinite cubic-bezier(0.25, 1, 0.5, 1); }
        .visual-wave-2 { animation: dynamicWave 5s infinite cubic-bezier(0.25, 1, 0.5, 1); animation-delay: 2.5s; }

        .scrollbar-none::-webkit-scrollbar { display: none; }
        .scrollbar-none { -ms-overflow-style: none; scrollbar-width: none; }

        @keyframes eqBar {
            0%, 100% { transform: scaleY(0.2); }
            50% { transform: scaleY(1); }
        }
        .eq-bar { animation: eqBar 1.2s ease-in-out infinite; transform-origin: bottom; }
        .eq-fast { animation-duration: 0.6s; }
        .eq-slow { animation-duration: 1.8s; }
    </style>
</head>
<body>

    <div id="root"></div>

    <div class="mesh-background">
        <div class="liquid-orb orb-1"></div>
        <div class="liquid-orb orb-2"></div>
        <div class="liquid-orb orb-3"></div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Список из 4 новых универсальных файлов озвучки
        const VOICE_FILES = [
            "audio/voice_1.mp3",
            "audio/voice_2.mp3",
            "audio/voice_3.mp3",
            "audio/voice_4.mp3"
        ];

        const SOUND_NAMES = { oriental: '🏮 Восток', bell: '🥣 Чаши', drone: '🪐 Космос', waves: '🌊 Океан', wind: '💨 Ветер' };
        
        const MOTIVATIONAL_MESSAGES = [
            "Каждый проданный девайс делает мир вокруг технологичнее и чище!",
            "Клиенты чувствуют твою уверенность. Выдохни, улыбнись и взорви эту смену!",
            "Заряжай устройства на витрине и вовремя заряжай свой внутренний аккумулятор.",
            "Премиальный сервис QSTORE начинается с твоего личного внутреннего спокойствия."
        ];

        const ALL_SESSIONS = [
            { id: 1, title: "Восточное созерцание (Ситар и Флейта)", duration: 10, category: "Осознанность", sound: "oriental", url: "https://ice1.somafm.com/suburbsofgoa-128-mp3" },
            { id: 2, title: "Тибетские чаши и покой ума", duration: 15, category: "Осознанность", sound: "bell", url: "https://ice1.somafm.com/dronezone-128-mp3" },
            { id: 3, title: "Мягкий Азиатский Дзен-Эмбиент", duration: 12, category: "Осознанность", sound: "oriental", url: "https://ice1.somafm.com/suburbsofgoa-128-mp3" },
            { id: 4, title: "Космический вечный штиль", duration: 30, category: "Сон", sound: "drone", url: "https://ice1.somafm.com/deepspaceone-128-mp3" },
            { id: 5, title: "Колыбельная ночного ветра", duration: 25, category: "Сон", sound: "wind", url: "https://ice1.somafm.com/dronezone-128-mp3" },
            { id: 6, title: "Разгрузка после сложных клиентов", duration: 15, category: "Снижение стресса", sound: "oriental", url: "https://ice1.somafm.com/suburbsofgoa-128-mp3" },
            { id: 7, title: "Растворение тревоги в звуке", duration: 10, category: "Снижение стресса", sound: "bell", url: "https://ice1.somafm.com/dronezone-128-mp3" },
            { id: 8, title: "Глубокий фокус без лишних мыслей", duration: 25, category: "Фокус и концентрация", sound: "drone", url: "https://ice1.somafm.com/deepspaceone-128-mp3" },
            { id: 9, title: "Умиротворение и баланс QSTORE", duration: 15, category: "Благодарность", sound: "oriental", url: "https://ice1.somafm.com/suburbsofgoa-128-mp3" },
            { id: 10, title: "Экспресс-релакс на перерыве", duration: 5, category: "Быстрое расслабление", sound: "oriental", url: "https://ice1.somafm.com/suburbsofgoa-128-mp3" }
        ];

        const DIRECTIONS = [
            { id: "mind", title: "Осознанность", bg: "bg-[#E6F2FF]", iconColor: "text-[#3B82F6]", symbol: "✦" },
            { id: "sleep", title: "Сон", bg: "bg-[#F3E8FF]", iconColor: "text-[#9333EA]", symbol: "☾" },
            { id: "stress", title: "Снижение стресса", bg: "bg-[#E6FDF5]", iconColor: "text-[#10B981]", symbol: "❖" },
            { id: "focus", title: "Фокус и концентрация", bg: "bg-[#FAE8FF]", iconColor: "text-[#D946EF]", symbol: "⬡" },
            { id: "breath", title: "Дыхательные практики", bg: "bg-[#E0F2FE]", iconColor: "text-[#0284C7]", symbol: "💨", isSpecial: true },
            { id: "gratitude", title: "Благодарность", bg: "bg-[#FCE7F3]", iconColor: "text-[#DB2777]", symbol: "♥" },
            { id: "quick", title: "Быстрое расслабление", bg: "bg-[#E0F2FE]", iconColor: "text-[#06B6D4]", symbol: "⏳" }
        ];

        const AudioEngine = {
            ctx: null,
            mainGain: null,
            subNodes: [],
            isPlaying: false,
            currentVolume: 0.05,

            init() {
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (this.ctx.state === 'suspended') {
                    this.ctx.resume();
                }
            },

            playAmbient(type, category = "Осознанность") {
                this.init();
                this.stop(); 
                this.isPlaying = true;

                this.mainGain = this.ctx.createGain();
                this.mainGain.gain.setValueAtTime(this.currentVolume, this.ctx.currentTime);
                this.mainGain.connect(this.ctx.destination);

                let isDeepRelax = (category === "Сон" || category === "Снижение стресса");

                if (type === 'oriental') {
                    const orientalScale = [164.81, 220.00, 246.94, 329.63, 440.00]; 
                    orientalScale.forEach((freq, idx) => {
                        const osc = this.ctx.createOscillator();
                        osc.type = 'triangle'; 
                        osc.frequency.setValueAtTime(freq, this.ctx.currentTime);

                        const filter = this.ctx.createBiquadFilter();
                        filter.type = 'lowpass';
                        filter.frequency.setValueAtTime(300, this.ctx.currentTime); 

                        const lfo = this.ctx.createOscillator();
                        lfo.type = 'sine';
                        lfo.frequency.setValueAtTime(0.03 + idx * 0.01, this.ctx.currentTime);

                        const lfoGain = this.ctx.createGain();
                        lfoGain.gain.setValueAtTime(0.08, this.ctx.currentTime);

                        const volumeNode = this.ctx.createGain();
                        volumeNode.gain.setValueAtTime(0.10, this.ctx.currentTime);

                        lfo.connect(lfoGain);
                        lfoGain.connect(volumeNode.gain);
                        osc.connect(filter);
                        filter.connect(volumeNode);
                        volumeNode.connect(this.mainGain);
                        
                        osc.start();
                        lfo.start();
                        this.subNodes.push(osc, filter, lfo, lfoGain, volumeNode);
                    });
                }
                else if (type === 'drone') {
                    const baseFreqs = isDeepRelax ? [55, 110, 165] : [73, 146, 219];
                    baseFreqs.forEach((freq, i) => {
                        const osc = this.ctx.createOscillator();
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(freq, this.ctx.currentTime);

                        const filter = this.ctx.createBiquadFilter();
                        filter.type = 'lowpass';
                        filter.frequency.setValueAtTime(150, this.ctx.currentTime);

                        const volumeNode = this.ctx.createGain();
                        volumeNode.gain.setValueAtTime(0.15, this.ctx.currentTime);

                        osc.connect(filter);
                        filter.connect(volumeNode);
                        volumeNode.connect(this.mainGain);
                        
                        osc.start();
                        this.subNodes.push(osc, filter, volumeNode);
                    });
                } 
                else if (type === 'waves') {
                    const bufferSize = 3 * this.ctx.sampleRate;
                    const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                    const data = buffer.getChannelData(0);
                    for (let i = 0; i < bufferSize; i++) { data[i] = Math.random() * 2 - 1; }

                    const noiseSource = this.ctx.createBufferSource();
                    noiseSource.buffer = buffer;
                    noiseSource.loop = true;

                    const filter = this.ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.setValueAtTime(250, this.ctx.currentTime);

                    const lfo = this.ctx.createOscillator();
                    lfo.type = 'sine';
                    lfo.frequency.setValueAtTime(0.08, this.ctx.currentTime);

                    const lfoGain = this.ctx.createGain();
                    lfoGain.gain.setValueAtTime(150, this.ctx.currentTime);

                    const finalNoiseGain = this.ctx.createGain();
                    finalNoiseGain.gain.setValueAtTime(0.8, this.ctx.currentTime); 

                    lfo.connect(lfoGain);
                    lfoGain.connect(filter.frequency);
                    noiseSource.connect(filter);
                    filter.connect(finalNoiseGain);
                    finalNoiseGain.connect(this.mainGain);

                    noiseSource.start();
                    lfo.start();
                    this.subNodes.push(noiseSource, lfo, filter, lfoGain, finalNoiseGain);
                } 
                else if (type === 'wind') {
                    const bufferSize = 3 * this.ctx.sampleRate;
                    const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                    const data = buffer.getChannelData(0);
                    for (let i = 0; i < bufferSize; i++) { data[i] = Math.random() * 2 - 1; }

                    const noiseSource = this.ctx.createBufferSource();
                    noiseSource.buffer = buffer;
                    noiseSource.loop = true;

                    const filter = this.ctx.createBiquadFilter();
                    filter.type = 'bandpass';
                    filter.Q.setValueAtTime(8.0, this.ctx.currentTime);
                    filter.frequency.setValueAtTime(400, this.ctx.currentTime);

                    const windLfo = this.ctx.createOscillator();
                    windLfo.type = 'sine';
                    windLfo.frequency.setValueAtTime(0.2, this.ctx.currentTime);

                    const windLfoGain = this.ctx.createGain();
                    windLfoGain.gain.setValueAtTime(100, this.ctx.currentTime);

                    const windVolume = this.ctx.createGain();
                    windVolume.gain.setValueAtTime(1.0, this.ctx.currentTime); 

                    windLfo.connect(windLfoGain);
                    windLfoGain.connect(filter.frequency);
                    noiseSource.connect(filter);
                    filter.connect(windVolume);
                    windVolume.connect(this.mainGain);

                    noiseSource.start();
                    windLfo.start();
                    this.subNodes.push(noiseSource, windLfo, filter, windLfoGain, windVolume);
                } 
                else if (type === 'bell') {
                    const bellScale = [220.00, 277.18, 329.63, 440.00];
                    bellScale.forEach((freq, idx) => {
                        const osc = this.ctx.createOscillator();
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(freq, this.ctx.currentTime);

                        const tremolo = this.ctx.createOscillator();
                        tremolo.type = 'sine';
                        tremolo.frequency.setValueAtTime(0.15, this.ctx.currentTime);

                        const tremoloGain = this.ctx.createGain();
                        tremoloGain.gain.setValueAtTime(0.03, this.ctx.currentTime);

                        const oscGain = this.ctx.createGain();
                        oscGain.gain.setValueAtTime(0.10, this.ctx.currentTime);

                        tremolo.connect(tremoloGain);
                        tremoloGain.connect(oscGain.gain);
                        osc.connect(oscGain);
                        oscGain.connect(this.mainGain);

                        osc.start();
                        tremolo.start();
                        this.subNodes.push(osc, tremolo, tremoloGain, oscGain);
                    });
                }
            },

            stop() {
                this.subNodes.forEach(node => {
                    try { node.stop(); } catch(e) {}
                    try { node.disconnect(); } catch(e) {}
                });
                if (this.mainGain) {
                    try { this.mainGain.disconnect(); } catch(e) {}
                    this.mainGain = null;
                }
                this.subNodes = [];
                this.isPlaying = false;
            }
        };

        function DynamicTicker() {
            const [currentIndex, setCurrentIndex] = useState(0);
            useEffect(() => {
                const interval = setInterval(() => {
                    setCurrentIndex((prev) => (prev + 1) % MOTIVATIONAL_MESSAGES.length);
                }, 7000); 
                return () => clearInterval(interval);
            }, []);

            return (
                <div className="w-full text-center px-2">
                    <div className="text-xs font-semibold italic py-3 px-5 rounded-2xl border text-zinc-500 bg-white/70 border-white/90 backdrop-blur-md transition-all duration-500 shadow-sm">
                        ✨ {MOTIVATIONAL_MESSAGES[currentIndex]}
                    </div>
                </div>
            );
        }

        function PremiumZenApp() {
            const [currentTab, setCurrentTab] = useState('dashboard');
            const [selectedCategoryFilter, setSelectedCategoryFilter] = useState(null);
            const [activePlayerSession, setActivePlayerSession] = useState(null);
            const [userStreak, setUserStreak] = useState(4);
            const [userTotalMinutes, setUserTotalMinutes] = useState(75);

            const handleQuickStart = () => {
                const available = selectedCategoryFilter ? ALL_SESSIONS.filter(s => s.category === selectedCategoryFilter) : ALL_SESSIONS;
                const randomTrack = available[Math.floor(Math.random() * available.length)];
                setActivePlayerSession(randomTrack);
            };

            return (
                <div className="min-h-screen pb-36 pt-4 px-4 max-w-xl mx-auto relative flex flex-col justify-between">
                    
                    <div key={currentTab} className="flex-1 page-transition">
                        {currentTab === 'dashboard' && (
                            <DashboardView 
                                streak={userStreak} totalMinutes={userTotalMinutes} 
                                activeCategory={selectedCategoryFilter} setActiveCategory={setSelectedCategoryFilter}
                                onStart={(s) => setActivePlayerSession(s)}
                                onQuickStart={handleQuickStart}
                                setTab={setCurrentTab}
                            />
                        )}
                        {currentTab === 'breathwork' && <BreathworkView />}
                    </div>

                    <div className="mt-6 mb-2">
                        <DynamicTicker />
                    </div>

                    <footer className="w-full text-center py-6 mt-4 border-t border-zinc-200/40">
                        <p className="text-[10px] font-black tracking-widest text-zinc-400 uppercase hover:text-zinc-600 transition-colors cursor-default">
                            Разработано <span className="text-transparent bg-clip-text bg-gradient-to-r from-cyan-500 to-indigo-500 font-black">EGORKIN DEV</span>
                        </p>
                    </footer>

                    {activePlayerSession && (
                        <MeditationPlayerScreen 
                            session={activePlayerSession}
                            onClose={() => { AudioEngine.stop(); setActivePlayerSession(null); }}
                            onComplete={(mins) => {
                                setUserTotalMinutes(p => p + mins);
                                setActivePlayerSession(null);
                            }}
                        />
                    )}

                    <nav className="fixed bottom-6 left-1/2 -translate-x-1/2 z-40 w-[88%] max-w-xs">
                        <div className="liquid-glass-dark rounded-[32px] p-1.5 flex items-center justify-between shadow-md">
                            <button onClick={() => { setCurrentTab('dashboard'); setSelectedCategoryFilter(null); }} className={`flex-1 flex items-center justify-center gap-2 py-3 rounded-2xl font-bold text-xs transition-all ${currentTab === 'dashboard' ? 'text-cyan-400 bg-white/10 shadow-inner' : 'text-zinc-400'}`}>
                                <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M2.25 12l8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" /></svg>
                                <span>Главная</span>
                            </button>
                            <button onClick={() => setCurrentTab('breathwork')} className={`flex-1 flex items-center justify-center gap-2 py-3 rounded-2xl font-bold text-xs transition-all ${currentTab === 'breathwork' ? 'text-cyan-400 bg-white/10 shadow-inner' : 'text-zinc-400'}`}>
                                <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M12.125 4.5V19.5M19.5 12.125H4.5" /></svg>
                                <span>Дыхание</span>
                            </button>
                        </div>
                    </nav>
                </div>
            );
        }

        function DashboardView({ streak, totalMinutes, activeCategory, setActiveCategory, onStart, onQuickStart, setTab }) {
            const displayedSessions = activeCategory ? ALL_SESSIONS.filter(s => s.category === activeCategory) : ALL_SESSIONS;
            const trackSectionRef = useRef(null);

            const handleDirectionClick = (dir) => {
                if (dir.isSpecial) {
                    setTab('breathwork');
                } else {
                    const nextCategory = activeCategory === dir.title ? null : dir.title;
                    setActiveCategory(nextCategory);
                    if (nextCategory) {
                        setTimeout(() => { trackSectionRef.current?.scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 120);
                    }
                }
            };

            return (
                <div className="space-y-8 text-center">
                    
                    <div className="liquid-glass rounded-[32px] p-6 flex flex-col items-center border border-white shadow-md">
                        <span className="text-[11px] font-extrabold tracking-widest text-cyan-600 bg-cyan-50 px-4 py-1.5 rounded-full mb-3">БОЛЬШАЯ СЕМЬЯ QSTORE</span>
                        <h1 className="text-3xl font-black tracking-tight mb-2"><span className="text-black">QSTORE</span> <span className="text-cyan-500">ZEN</span></h1>
                        <p className="text-zinc-500 max-w-md text-xs font-medium mb-5">Раслабляющий антистресс-баланс под задачи твоей команды.</p>

                        <div className="flex items-center justify-center gap-6 bg-white/90 border border-zinc-100 p-3 rounded-2xl shadow-sm w-full max-w-xs mb-5">
                            <div className="flex-1"><span className="block text-xl font-black text-zinc-900">{streak}</span><span className="text-[9px] font-bold text-zinc-400 uppercase">Дней серии</span></div>
                            <div className="w-[1px] h-6 bg-zinc-200" />
                            <div className="flex-1"><span className="block text-xl font-black text-zinc-900">{totalMinutes}</span><span className="text-[9px] font-bold text-zinc-400 uppercase">Всего минут</span></div>
                        </div>

                        <button onClick={onQuickStart} className="flex items-center justify-center w-full max-w-xs py-3.5 bg-gradient-to-r from-zinc-900 to-zinc-800 text-white font-bold text-xs rounded-2xl shadow-md apple-spring uppercase tracking-wider">
                             Быстрый старт релаксации
                        </button>
                    </div>

                    <div className="space-y-4">
                        <div className="flex items-center justify-between px-1 h-9">
                            <h2 className="text-lg font-extrabold text-zinc-900 tracking-tight whitespace-nowrap">ВЫБЕРИ НАПРАВЛЕНИЕ</h2>
                            {activeCategory && (
                                <button onClick={() => setActiveCategory(null)} className="text-[11px] font-bold text-cyan-600 bg-white px-3 py-1.5 rounded-full shadow-sm border border-zinc-200/60 active:scale-95 transition-all whitespace-nowrap ml-2 page-transition">
                                    Сбросить ×
                                </button>
                            )}
                        </div>
                        
                        <div className="grid grid-cols-2 gap-3.5">
                            {DIRECTIONS.map((dir, index) => {
                                const isSelected = activeCategory === dir.title;
                                return (
                                    <div 
                                        key={dir.id}
                                        onClick={() => handleDirectionClick(dir)}
                                        style={{ animationDelay: `${index * 40}ms` }}
                                        className={`bg-white/95 rounded-[28px] p-5 flex flex-col items-center justify-center text-center aspect-square border apple-spring cursor-pointer select-none transition-all duration-300 ${
                                            isSelected 
                                                ? 'border-zinc-900 bg-zinc-50/80 shadow-inner scale-[0.96] ring-4 ring-zinc-900/5' 
                                                : 'border-zinc-100 shadow-sm'
                                        }`}
                                    >
                                        <div className={`w-12 h-12 ${dir.bg} ${dir.iconColor} rounded-2xl flex items-center justify-center text-xl font-bold mb-4 shadow-sm transition-transform ${isSelected ? 'scale-110 rotate-3' : ''}`}>
                                            {dir.symbol}
                                        </div>
                                        <span className={`text-[13px] font-bold leading-snug px-1 transition-colors ${isSelected ? 'text-zinc-950 font-black' : 'text-zinc-800'}`}>
                                            {dir.title}
                                        </span>
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    <div ref={trackSectionRef} key={activeCategory || 'all'} className="space-y-3 text-left pt-6 scroll-mt-6 page-transition">
                        <h3 className="text-xs font-extrabold text-zinc-400 uppercase tracking-wider px-1">
                            {activeCategory ? `Программы: ${activeCategory}` : 'Все доступные сессии'} ({displayedSessions.length})
                        </h3>
                        
                        <div className="space-y-2.5 max-h-[420px] overflow-y-auto pr-1 scrollbar-none pb-4">
                            {displayedSessions.map((session, sIdx) => (
                                <div 
                                    key={session.id} 
                                    onClick={() => onStart(session)} 
                                    style={{ animationDelay: `${sIdx * 30}ms` }}
                                    className="liquid-glass bg-white/80 hover:bg-white rounded-2xl p-4 flex items-center justify-between cursor-pointer apple-spring shadow-sm border border-white group"
                                >
                                    <div className="space-y-1 pr-4 truncate">
                                        <span className="text-[9px] font-extrabold text-cyan-600 bg-cyan-50 px-2 py-0.5 rounded uppercase">{session.category}</span>
                                        <h4 className="font-bold text-zinc-900 text-xs sm:text-sm truncate group-hover:text-cyan-600 transition-colors">{session.title}</h4>
                                        <div className="flex items-center gap-2 text-[10px] text-zinc-400 font-medium">
                                            <span>⏱ {session.duration} мин</span>
                                            <span>•</span>
                                            <span>{SOUND_NAMES[session.sound]}</span>
                                        </div>
                                    </div>
                                    <div className="w-8 h-8 rounded-full bg-zinc-50 group-hover:bg-cyan-50 flex items-center justify-center text-zinc-400 group-hover:text-cyan-600 transition-all shrink-0">
                                        <svg className="w-4 h-4 fill-current text-cyan-600" viewBox="0 0 24 24"><path d="M8 5v14l11-7z" /></svg>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                </div>
            );
        }

        function BreathworkView() {
            const [phase, setPhase] = useState('Вдох');
            const [timer, setTimer] = useState(4);
            const [active, setActive] = useState(false);

            useEffect(() => {
                let interval = null;
                if (active) {
                    interval = setInterval(() => {
                        setTimer(t => {
                            if (t <= 1) {
                                setPhase(p => p === 'Вдох' ? 'Задержка' : p === 'Задержка' ? 'Выдох' : 'Вдох');
                                return 4;
                            }
                            return t - 1;
                        });
                    }, 1000);
                } else { clearInterval(interval); }
                return () => clearInterval(interval);
            }, [active]);

            return (
                <div className="max-w-md mx-auto text-center space-y-6 pt-4 animate-fade-in">
                    <h2 className="text-xl font-black text-zinc-900">Антистресс-дыхание</h2>
                    <div className="liquid-glass bg-white rounded-[40px] aspect-square max-w-[240px] mx-auto flex flex-col justify-center items-center relative shadow-sm">
                        {active && (
                            <>
                                <div className="absolute inset-4 rounded-[32px] bg-cyan-400/10 blur-xl visual-wave-1 pointer-events-none" />
                                <div className="absolute inset-4 rounded-[32px] bg-indigo-400/10 blur-xl visual-wave-2 pointer-events-none" />
                            </>
                        )}
                        <h3 className="text-base font-bold z-10 text-zinc-800">{active ? phase : 'Квадрат баланса'}</h3>
                        <div className="text-4xl font-light mt-2 z-10 tabular-nums">{timer}с</div>
                    </div>
                    <button onClick={() => { setActive(!active); if(!active) AudioEngine.playAmbient('oriental', 'Дыхательные практики'); else AudioEngine.stop(); }} className="w-full max-w-[180px] py-3.5 bg-zinc-950 text-white rounded-full font-bold shadow-md apple-spring text-xs uppercase tracking-wider">
                        {active ? 'Остановить' : 'Начать практику'}
                    </button>
                </div>
            );
        }

        function MeditationPlayerScreen({ session, onClose, onComplete }) {
            const [isPlaying, setIsPlaying] = useState(true);
            const [secondsRemaining, setSecondsRemaining] = useState(session.duration * 60);
            const [isVoiceEnabled, setIsVoiceEnabled] = useState(true);
            const [soundType, setSoundType] = useState(session.sound || 'oriental');

            const voiceAudioRef = useRef(null);
            const streamMusicRef = useRef(null);
            
            const currentVoiceIdxRef = useRef(0);
            const voiceCooldownRef = useRef(5); // Первая фраза зазвучит через 5 секунд после входа
            const isVoicePlayingRef = useRef(false);
            const speechDurationCounterRef = useRef(0); // Счетчик длительности текущей фразы

            const totalSeconds = session.duration * 60;
            const elapsedSeconds = totalSeconds - secondsRemaining;

            useEffect(() => {
                AudioEngine.init();

                voiceAudioRef.current = new Audio();
                voiceAudioRef.current.crossOrigin = "anonymous";
                voiceAudioRef.current.volume = 0.50; 

                // Если запись закончилась сама раньше лимита в 15 секунд
                const handleVoiceEnded = () => {
                    isVoicePlayingRef.current = false;
                    speechDurationCounterRef.current = 0;
                    voiceCooldownRef.current = 60; // Уходим на 1 минуту в глубокую паузу
                };
                voiceAudioRef.current.addEventListener('ended', handleVoiceEnded);

                streamMusicRef.current = new Audio(session.url);
                streamMusicRef.current.loop = true;
                streamMusicRef.current.crossOrigin = "anonymous";
                streamMusicRef.current.volume = 0.04; 

                if (AudioEngine.ctx) {
                    try {
                        const voiceSource = AudioEngine.ctx.createMediaElementSource(voiceAudioRef.current);
                        voiceSource.connect(AudioEngine.ctx.destination);
                        
                        const musicSource = AudioEngine.ctx.createMediaElementSource(streamMusicRef.current);
                        musicSource.connect(AudioEngine.ctx.destination);
                    } catch (e) {
                        console.log("Audio bypass log: active");
                    }
                }

                if (isPlaying) {
                    streamMusicRef.current.play().catch(()=>{});
                    AudioEngine.playAmbient(soundType, session.category);
                }

                return () => {
                    if (voiceAudioRef.current) {
                        voiceAudioRef.current.pause();
                        voiceAudioRef.current.removeEventListener('ended', handleVoiceEnded);
                    }
                    if (streamMusicRef.current) streamMusicRef.current.pause();
                    AudioEngine.stop();
                };
            }, []);

            useEffect(() => {
                if (isPlaying) {
                    AudioEngine.playAmbient(soundType, session.category);
                    if (streamMusicRef.current) {
                        streamMusicRef.current.play().catch(()=>{});
                    }
                    if (isVoiceEnabled && isVoicePlayingRef.current && voiceAudioRef.current) {
                        voiceAudioRef.current.play().catch(()=>{});
                    }
                } else {
                    AudioEngine.stop();
                    if (voiceAudioRef.current) voiceAudioRef.current.pause();
                    if (streamMusicRef.current) streamMusicRef.current.pause();
                }
            }, [isPlaying, soundType]);

            // Основной посекундный игровой цикл
            useEffect(() => {
                let sessionTimer = null;
                
                if (isPlaying && secondsRemaining > 0) {
                    sessionTimer = setInterval(() => {
                        
                        if (!isVoiceEnabled) {
                            if (voiceAudioRef.current && !voiceAudioRef.current.paused) {
                                voiceAudioRef.current.pause();
                            }
                            isVoicePlayingRef.current = false;
                            speechDurationCounterRef.current = 0;
                            voiceCooldownRef.current = 5; 
                        } else {
                            if (isVoicePlayingRef.current) {
                                speechDurationCounterRef.current += 1;

                                // Умное прерывание: если гид говорит дольше 15 секунд — даем отдохнуть
                                if (speechDurationCounterRef.current >= 15) {
                                    if (voiceAudioRef.current) voiceAudioRef.current.pause();
                                    isVoicePlayingRef.current = false;
                                    speechDurationCounterRef.current = 0;
                                    voiceCooldownRef.current = 60; // Запуск минутной паузы
                                } else {
                                    if (voiceAudioRef.current && voiceAudioRef.current.paused) {
                                        voiceAudioRef.current.play().catch(()=>{});
                                    }
                                }
                            } else {
                                // Режим ожидания/тишины гида
                                if (voiceCooldownRef.current > 0) {
                                    voiceCooldownRef.current -= 1;
                                } else {
                                    // Запускаем случайную или следующую запись из 4 универсальных вариантов
                                    if (voiceAudioRef.current) {
                                        voiceAudioRef.current.src = VOICE_FILES[currentVoiceIdxRef.current];
                                        voiceAudioRef.current.load();
                                        voiceAudioRef.current.play().then(() => {
                                            isVoicePlayingRef.current = true;
                                            speechDurationCounterRef.current = 0;
                                            currentVoiceIdxRef.current = (currentVoiceIdxRef.current + 1) % VOICE_FILES.length;
                                        }).catch(e => console.log("Voice system play hold", e));
                                    }
                                }
                            }
                        }

                        if (secondsRemaining <= 1) {
                            AudioEngine.stop();
                            if (voiceAudioRef.current) voiceAudioRef.current.pause();
                            if (streamMusicRef.current) streamMusicRef.current.pause();
                            onComplete(session.duration);
                        } else {
                            setSecondsRemaining(prev => prev - 1);
                        }
                    }, 1000);
                }
                
                return () => clearInterval(sessionTimer);
            }, [isPlaying, isVoiceEnabled, secondsRemaining]);

            const changeNoiseDirectly = (type) => {
                setSoundType(type);
                if (isPlaying) {
                    AudioEngine.playAmbient(type, session.category);
                }
            };

            const progressPercentage = (elapsedSeconds / totalSeconds) * 100;

            const formatTime = (secs) => {
                const m = Math.floor(secs / 60);
                const s = String(secs % 60).padStart(2, '0');
                return `${m}:${s}`;
            };

            return (
                <div className="fixed inset-0 z-50 bg-[#F4F5F9]/80 backdrop-blur-2xl flex flex-col justify-between p-6 text-center page-transition overflow-y-auto scrollbar-none text-zinc-900">
                    
                    <div className="player-neon-container">
                        <div className="player-neon-orb-1"></div>
                        <div className="player-neon-orb-2"></div>
                        <div className="player-neon-orb-3"></div>
                    </div>

                    <div className="flex items-center justify-between w-full max-w-md mx-auto shrink-0 px-2 relative z-10">
                        <button onClick={() => { AudioEngine.stop(); if (voiceAudioRef.current) voiceAudioRef.current.pause(); if(streamMusicRef.current) streamMusicRef.current.pause(); onClose(); }} className="bg-zinc-200/80 text-zinc-900 px-5 py-2.5 rounded-full text-xs font-bold apple-spring">Назад</button>
                        <div className="text-center truncate max-w-[180px]">
                            <h2 className="font-extrabold text-zinc-900 text-xs truncate">{session.title}</h2>
                            <span className="text-[9px] font-bold text-cyan-600 block mt-0.5">Режим: {session.category}</span>
                        </div>
                        <button onClick={() => { AudioEngine.stop(); if (voiceAudioRef.current) voiceAudioRef.current.pause(); if(streamMusicRef.current) streamMusicRef.current.pause(); onComplete(session.duration); }} className="bg-zinc-900 text-white px-5 py-2.5 rounded-full text-xs font-bold apple-spring">Готово</button>
                    </div>

                    <div className="flex-1 flex flex-col items-center justify-center relative my-4 min-h-[180px] z-10">
                        {isPlaying && <div className="absolute w-64 h-64 rounded-full bg-gradient-to-tr from-cyan-400/10 to-emerald-500/10 blur-xl visual-wave-1 pointer-events-none" />}
                        
                        <div className="w-40 h-40 rounded-full liquid-glass flex flex-col items-center justify-center shadow-md border border-white z-10 relative">
                            <span className="text-4xl font-light tabular-nums text-zinc-900">{Math.floor(secondsRemaining / 60)}:{String(secondsRemaining % 60).padStart(2, '0')}</span>
                            
                            {isPlaying && (
                                <div className="flex items-end gap-1.5 h-5 mt-3">
                                    <div className="w-1 bg-emerald-400 rounded-full eq-bar eq-slow" style={{height: '100%'}}></div>
                                    <div className="w-1 bg-cyan-400 rounded-full eq-bar" style={{height: '60%', animationDelay: '0.2s'}}></div>
                                    <div className="w-1 bg-teal-500 rounded-full eq-bar eq-slow" style={{height: '40%', animationDelay: '0.4s'}}></div>
                                </div>
                            )}
                        </div>
                    </div>

                    <div className="w-full max-w-sm mx-auto space-y-2 shrink-0 relative z-10">
                        <div className="w-full bg-black/[0.07] rounded-full h-1 overflow-hidden relative">
                            <div style={{ width: `${progressPercentage}%` }} className="bg-zinc-800 h-full rounded-full transition-all duration-300 ease-out" />
                        </div>
                        
                        <div className="flex justify-between text-[11px] font-medium text-zinc-400/90 tracking-tight px-0.5 select-none">
                            <span>{formatTime(elapsedSeconds)}</span>
                            <span>{formatTime(totalSeconds)}</span>
                        </div>

                        <div className="flex items-center justify-center pt-3">
                            <button onClick={() => setIsPlaying(!isPlaying)} className="w-14 h-14 rounded-full bg-zinc-950 text-white flex items-center justify-center shadow-md hover:scale-105 active:scale-95 transition-transform">
                                {isPlaying ? (
                                    <svg className="w-5 h-5 fill-current" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                                ) : (
                                    <svg className="w-5 h-5 fill-current ml-0.5" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                                )}
                            </button>
                        </div>

                        <div className="bg-white/90 border border-zinc-200/60 rounded-3xl p-5 space-y-4 shadow-sm text-left backdrop-blur-md">
                            <div>
                                <span className="block text-[9px] font-black text-zinc-400 uppercase tracking-wider mb-2.5">Генерируемый звук (Мягкий фон)</span>
                                <div className="grid grid-cols-2 gap-1.5 text-[11px] font-bold">
                                    {['oriental', 'bell', 'drone', 'waves'].map((snd) => {
                                        const isSelected = soundType === snd;
                                        return (
                                            <button 
                                                key={snd} 
                                                onClick={() => changeNoiseDirectly(snd)} 
                                                className={`py-2.5 px-2 rounded-xl transition-all flex items-center justify-center gap-1 border active:scale-95 ${
                                                    isSelected 
                                                        ? 'bg-zinc-900 text-white border-zinc-900 shadow-sm font-black' 
                                                        : 'bg-zinc-100 text-zinc-600 border-transparent hover:bg-zinc-200'
                                                }`}
                                            >
                                                {SOUND_NAMES[snd]}
                                            </button>
                                        );
                                    })}
                                </div>
                            </div>

                            <div className="pt-3.5 border-t border-zinc-100 flex items-center justify-between">
                                <span className="text-xs font-bold text-zinc-800">Озвучка гида (Сопровождение)</span>
                                <button onClick={() => setIsVoiceEnabled(!isVoiceEnabled)} className={`relative inline-flex h-5 w-10 items-center rounded-full transition-colors duration-300 ${isVoiceEnabled ? 'bg-emerald-500' : 'bg-zinc-200'}`}>
                                    <span className={`inline-block h-3 w-3 transform rounded-full bg-white transition-transform duration-300 ${isVoiceEnabled ? 'translate-x-6' : 'translate-x-1'}`} />
                                </button>
                            </div>
                        </div>
                    </div>

                    <div className="mt-4 shrink-0 max-w-sm mx-auto w-full relative z-10">
                        <DynamicTicker />
                    </div>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PremiumZenApp />);
    </script>
</body>
</html>
