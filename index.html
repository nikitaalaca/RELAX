            background: var(--nav-bg);

            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--nav-border);
            box-shadow: var(--shadow-elevated);

        .mesh-background {
            position: fixed;

            z-index: -1;

            overflow: hidden;

        .liquid-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.06;
            animation: floatingMesh 20s infinite alternate ease-in-out;

            right: -100px;

        @keyframes floatingMesh {
            0% { transform: translate(0, 0) scale(1); opacity: 0.05; }
            50% { transform: translate(40px, -30px) scale(1.1); opacity: 0.08; }
            100% { transform: translate(-20px, 20px) scale(0.95); opacity: 0.05; }

        @keyframes pageEnter {
            0% { opacity: 0; transform: translateX(20px); }
            100% { opacity: 1; transform: translateX(0); }

        @keyframes pageExit {
            0% { opacity: 1; transform: translateX(0); }

        .scrollbar-none {
            -ms-overflow-style: none;

<body class="safe-bottom safe-top">

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback, useMemo, createContext, useContext } = React;

        // Инициализация Telegram
        try {
            window.Telegram?.WebApp?.ready();
            window.Telegram?.WebApp?.expand();
        } catch(e) {}

        // =================== АУДИО-ДВИЖОК ===================
        const AudioEngine = {
            ctx: null,
            mainGain: null,
            nodes: [],
            isPlaying: false,
            volume: 0.04,

            init() {
                try {
                    if (!this.ctx || this.ctx.state === 'closed') {
                        this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                    }
                    if (this.ctx.state === 'suspended') {
                        this.ctx.resume();
                    }
                } catch(e) {
                    console.error('Audio init error:', e);
                }
            },

            play(type, category = "Осознанность") {
                try {
                    this.init();
                    this.stop();
                    this.isPlaying = true;

                    this.mainGain = this.ctx.createGain();
                    this.mainGain.gain.setValueAtTime(this.volume, this.ctx.currentTime);
                    this.mainGain.connect(this.ctx.destination);

                    const isDeep = (category === "Сон" || category === "Снижение стресса");

                    switch(type) {
                        case 'oriental':
                            this._createOriental();
                            break;
                        case 'bell':
                            this._createBells();
                            break;
                        case 'drone':
                            this._createDrone(isDeep);
                            break;
                        case 'waves':
                            this._createWaves();
                            break;
                        case 'rain':
                            this._createRain();
                            break;
                        case 'forest':
                            this._createForest();
                            break;
                        case 'fire':
                            this._createFire();
                            break;
                        case 'wind':
                            this._createWind();
                            break;
                        default:
                            this._createOriental();
                    }
                } catch(e) {
                    console.error('Audio play error:', e);
                    this.stop();
                }
            },

            _createOriental() {
                const freqs = [130.81, 164.81, 196.00, 246.94, 329.63];
                freqs.forEach((freq, i) => {
                    const osc = this.ctx.createOscillator();
                    osc.type = i % 2 === 0 ? 'sine' : 'triangle';
                    osc.frequency.value = freq;
                    
                    const filter = this.ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.value = 200 + i * 50;
                    
                    const lfo = this.ctx.createOscillator();
                    lfo.type = 'sine';
                    lfo.frequency.value = 0.02 + i * 0.01;
                    
                    const lfoGain = this.ctx.createGain();
                    lfoGain.gain.value = 0.1;
                    
                    const gain = this.ctx.createGain();
                    gain.gain.value = 0.08;
                    
                    lfo.connect(lfoGain);
                    lfoGain.connect(gain.gain);
                    osc.connect(filter);
                    filter.connect(gain);
                    gain.connect(this.mainGain);
                    
                    osc.start();
                    lfo.start();
                    this.nodes.push(osc, filter, lfo, lfoGain, gain);
                });
            },

            _createBells() {
                const freqs = [174.61, 220.00, 261.63, 329.63, 392.00];
                freqs.forEach((freq, i) => {
                    const osc = this.ctx.createOscillator();
                    osc.type = 'sine';
                    osc.frequency.value = freq;
                    
                    const tremolo = this.ctx.createOscillator();
                    tremolo.type = 'sine';
                    tremolo.frequency.value = 0.12 + i * 0.02;
                    
                    const tremGain = this.ctx.createGain();
                    tremGain.gain.value = 0.04;
                    
                    const harmonic = this.ctx.createOscillator();
                    harmonic.type = 'sine';
                    harmonic.frequency.value = freq * 2;
                    
                    const harmGain = this.ctx.createGain();
                    harmGain.gain.value = 0.02;
                    
                    const gain = this.ctx.createGain();
                    gain.gain.value = 0.07;
                    
                    tremolo.connect(tremGain);
                    tremGain.connect(gain.gain);
                    osc.connect(gain);
                    gain.connect(this.mainGain);
                    harmonic.connect(harmGain);
                    harmGain.connect(this.mainGain);
                    
                    osc.start();
                    tremolo.start();
                    harmonic.start();
                    this.nodes.push(osc, tremolo, harmonic, tremGain, harmGain, gain);
                });
            },

            _createDrone(isDeep) {
                const freqs = isDeep ? [55, 82.5, 110, 165] : [65.41, 98, 130.81, 196];
                freqs.forEach((freq, i) => {
                    const osc = this.ctx.createOscillator();
                    osc.type = i === 0 ? 'sine' : 'triangle';
                    osc.frequency.value = freq;
                    
                    const filter = this.ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.value = 200 + i * 30;
                    
                    const pan = this.ctx.createStereoPanner();
                    pan.pan.value = i % 2 === 0 ? -0.3 : 0.3;
                    
                    const gain = this.ctx.createGain();
                    gain.gain.value = 0.08;
                    
                    osc.connect(filter);
                    filter.connect(pan);
                    pan.connect(gain);
                    gain.connect(this.mainGain);
                    
                    osc.start();
                    this.nodes.push(osc, filter, pan, gain);
                });
            },

            _createWaves() {
                const size = 4 * this.ctx.sampleRate;
                const buffer = this.ctx.createBuffer(1, size, this.ctx.sampleRate);
                const data = buffer.getChannelData(0);
                let last = 0;
                for (let i = 0; i < size; i++) {
                    const white = Math.random() * 2 - 1;
                    data[i] = (last + 0.02 * white) / 1.02;
                    last = data[i];
                }
                
                const source = this.ctx.createBufferSource();
                source.buffer = buffer;
                source.loop = true;
                
                const filter = this.ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 400;
                
                const lfo = this.ctx.createOscillator();
                lfo.type = 'sine';
                lfo.frequency.value = 0.1;
                
                const lfoGain = this.ctx.createGain();
                lfoGain.gain.value = 200;
                
                const gain = this.ctx.createGain();
                gain.gain.value = 0.5;
                
                lfo.connect(lfoGain);
                lfoGain.connect(filter.frequency);
                source.connect(filter);
                filter.connect(gain);
                gain.connect(this.mainGain);
                
                source.start();
                lfo.start();
                this.nodes.push(source, lfo, filter, lfoGain, gain);
            },

            _createRain() {
                const size = 2 * this.ctx.sampleRate;
                const buffer = this.ctx.createBuffer(1, size, this.ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < size; i++) {
                    data[i] = Math.random() * 2 - 1;
                }
                
                const source = this.ctx.createBufferSource();
                source.buffer = buffer;
                source.loop = true;
                
                const filter = this.ctx.createBiquadFilter();
                filter.type = 'bandpass';
                filter.frequency.value = 800;
                filter.Q.value = 0.5;
                
                const gain = this.ctx.createGain();
                gain.gain.value = 0.6;
                
                source.connect(filter);
                filter.connect(gain);
                gain.connect(this.mainGain);
                
                source.start();
                this.nodes.push(source, filter, gain);
            },

            _createForest() {
                const osc = this.ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.value = 800;
                
                const lfo = this.ctx.createOscillator();
                lfo.type = 'sine';
                lfo.frequency.value = 5;
                
                const lfoGain = this.ctx.createGain();
                lfoGain.gain.value = 200;
                
                const gain = this.ctx.createGain();
                gain.gain.value = 0.08;
                
                lfo.connect(lfoGain);
                lfoGain.connect(osc.frequency);
                osc.connect(gain);
                gain.connect(this.mainGain);
                
                osc.start();
                lfo.start();
                this.nodes.push(osc, lfo, lfoGain, gain);
            },

            _createFire() {
                const size = 2 * this.ctx.sampleRate;
                const buffer = this.ctx.createBuffer(1, size, this.ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < size; i++) {
                    data[i] = (Math.random() * 2 - 1) * 0.3;
                }
                
                const source = this.ctx.createBufferSource();
                source.buffer = buffer;
                source.loop = true;
                
                const filter = this.ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 300;
                
                const gain = this.ctx.createGain();
                gain.gain.value = 0.7;
                
                source.connect(filter);
                filter.connect(gain);
                gain.connect(this.mainGain);
                
                source.start();
                this.nodes.push(source, filter, gain);
            },

            _createWind() {
                const size = 4 * this.ctx.sampleRate;
                const buffer = this.ctx.createBuffer(1, size, this.ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < size; i++) {
                    data[i] = Math.random() * 2 - 1;
                }
                
                const source = this.ctx.createBufferSource();
                source.buffer = buffer;
                source.loop = true;
                
                const filter = this.ctx.createBiquadFilter();
                filter.type = 'bandpass';
                filter.frequency.value = 500;
                filter.Q.value = 2;
                
                const lfo = this.ctx.createOscillator();
                lfo.type = 'sine';
                lfo.frequency.value = 0.15;
                
                const lfoGain = this.ctx.createGain();
                lfoGain.gain.value = 150;
                
                const gain = this.ctx.createGain();
                gain.gain.value = 0.5;
                
                lfo.connect(lfoGain);
                lfoGain.connect(filter.frequency);
                source.connect(filter);
                filter.connect(gain);
                gain.connect(this.mainGain);
                
                source.start();
                lfo.start();
                this.nodes.push(source, lfo, filter, lfoGain, gain);
            },

            stop() {
                try {
                    this.nodes.forEach(node => {
                        try { node.stop(); } catch(e) {}
                        try { node.disconnect(); } catch(e) {}
                    });
                    if (this.mainGain) {
                        try { this.mainGain.disconnect(); } catch(e) {}
                    }
                } catch(e) {
                    console.error('Audio stop error:', e);
                }
                this.nodes = [];
                this.mainGain = null;
                this.isPlaying = false;
            },

            setVolume(vol) {
                this.volume = Math.max(0, Math.min(0.1, vol));
                if (this.mainGain) {
                    this.mainGain.gain.setValueAtTime(this.volume, this.ctx.currentTime);
                }
            }
        };

        // =================== ДАННЫЕ ===================

        const PlayerContext = createContext(null);

        function PlayerProvider({ children }) {
            const [activeSession, setActiveSession] = useState(null);
            const [isMinimized, setIsMinimized] = useState(false);
            const [isPlaying, setIsPlaying] = useState(true);
            const [secondsRemaining, setSecondsRemaining] = useState(0);
            const [totalSeconds, setTotalSeconds] = useState(0);

            const startSession = useCallback((session) => {
                setActiveSession(session);
                setSecondsRemaining(session.duration * 60);
                setTotalSeconds(session.duration * 60);
                setIsPlaying(true);
                setIsMinimized(false);
                AudioEngine.play(session.sound, session.category);
            }, []);

            const stopSession = useCallback(() => {
                AudioEngine.stop();
                setActiveSession(null);
                setIsMinimized(false);
            }, []);

            const toggleMinimize = useCallback(() => {
                setIsMinimized(prev => !prev);
            }, []);

            const value = useMemo(() => ({
                activeSession, isMinimized, isPlaying, secondsRemaining, totalSeconds,
                startSession, stopSession, toggleMinimize,
                setActiveSession, setIsPlaying, setSecondsRemaining, setIsMinimized
            }), [activeSession, isMinimized, isPlaying, secondsRemaining, totalSeconds,
                 startSession, stopSession, toggleMinimize]);

            return (
                <PlayerContext.Provider value={value}>
                    {children}
                </PlayerContext.Provider>
            );
        }

        function usePlayer() {
            const context = useContext(PlayerContext);
            if (!context) throw new Error('usePlayer must be used within PlayerProvider');
            return context;
        }

        // =================== КОМПОНЕНТЫ ===================

            const progress = totalSeconds > 0 ? ((totalSeconds - secondsRemaining) / totalSeconds) * 100 : 0;

            };

        // =================== ДЫХАТЕЛЬНАЯ ПРАКТИКА ===================
        function BreathworkView() {
            const [phase, setPhase] = useState('Вдох');
            const [timer, setTimer] = useState(4);
            const [active, setActive] = useState(false);
            const [cycles, setCycles] = useState(0);
            const [musicType, setMusicType] = useState('oriental');
            const intervalRef = useRef(null);

            useEffect(() => {
                return () => {
                    if (intervalRef.current) clearInterval(intervalRef.current);
                    AudioEngine.stop();
                };
            }, []);

            useEffect(() => {
                if (active) {
                    intervalRef.current = setInterval(() => {
                        setTimer(t => {
                            if (t <= 1) {
                                setPhase(p => {
                                    if (p === 'Вдох') return 'Задержка';
                                    if (p === 'Задержка') {
                                        setCycles(c => c + 1);
                                        return 'Выдох';
                                    }
                                    return 'Вдох';
                                });
                                return 4;
                            }
                            return t - 1;
                        });
                    }, 1000);
                }
                return () => {
                    if (intervalRef.current) clearInterval(intervalRef.current);
                };
            }, [active]);

            const togglePractice = useCallback(() => {
                setActive(prev => {
                    const next = !prev;
                    if (next) {
                        AudioEngine.play(musicType, 'Дыхательные практики');
                        AudioEngine.setVolume(0.03);
                    } else {
                        AudioEngine.stop();
                        setPhase('Вдох');
                        setTimer(4);
                        setCycles(0);
                    }
                    return next;
                });
            }, [musicType]);

            return (
                <div className="max-w-md mx-auto text-center space-y-6 pt-6 page-transition">
                    <div className="space-y-2">
                        <h2 className="text-2xl font-black text-zinc-900 dark:text-white">Антистресс-дыхание</h2>
                        <p className="text-xs text-zinc-500 dark:text-zinc-400 font-medium">Квадратное дыхание 4×4</p>
                    </div>

                    <div className="liquid-glass rounded-[40px] aspect-square max-w-[280px] mx-auto flex flex-col justify-center items-center relative shadow-md">
                        {active && (
                            <>
                                <div className="absolute inset-4 rounded-[32px] bg-cyan-400/10 dark:bg-cyan-400/5 blur-xl" 
                                     style={{animation: 'dynamicWave 6s infinite cubic-bezier(0.25, 1, 0.5, 1)'}} />
                                <div className="absolute inset-4 rounded-[32px] bg-indigo-400/10 dark:bg-indigo-400/5 blur-xl"
                                     style={{animation: 'dynamicWave 6s infinite cubic-bezier(0.25, 1, 0.5, 1)', animationDelay: '3s'}} />
                            </>
                        )}
                        <h3 className="text-lg font-bold z-10 text-zinc-800 dark:text-zinc-200">
                            {active ? phase : 'Готовы?'}
                        </h3>
                        <div className="text-5xl font-light mt-4 z-10 tabular-nums text-zinc-900 dark:text-white">
                            {timer}с
                        </div>
                        {active && (
                            <div className="mt-4 z-10">
                                <span className="text-xs font-medium text-zinc-400 dark:text-zinc-500">
                                    Циклов: {cycles}
                                </span>
                            </div>
                        )}
                    </div>

                    <div className="bg-white/80 dark:bg-zinc-800/80 rounded-2xl p-4 border border-white/50 dark:border-zinc-700/30 max-w-[280px] mx-auto">
                        <span className="text-[10px] font-extrabold text-zinc-400 dark:text-zinc-500 uppercase tracking-wider mb-2 block">
                            Фоновая музыка
                        </span>
                        <div className="grid grid-cols-3 gap-2">
                            {['oriental', 'bell', 'rain', 'forest', 'fire', 'drone'].map(type => (
                                <button
                                    key={type}
                                    onClick={() => {
                                        setMusicType(type);
                                        if (active) {
                                            AudioEngine.stop();
                                            AudioEngine.play(type, 'Дыхательные практики');
                                        }
                                    }}
                                    className={`text-[11px] font-bold py-2 px-1 rounded-xl border transition-all active:scale-95 ${
                                        musicType === type 
                                            ? 'bg-zinc-900 dark:bg-zinc-200 text-white dark:text-zinc-900 border-zinc-900 dark:border-zinc-200'
                                            : 'bg-zinc-100 dark:bg-zinc-700 text-zinc-600 dark:text-zinc-300 border-transparent hover:bg-zinc-200 dark:hover:bg-zinc-600'
                                    }`}
                                >
                                    {SOUND_NAMES[type]}
                                </button>
                            ))}
                        </div>
                    </div>

                    <button 
                        onClick={togglePractice} 
                        className="w-full max-w-[240px] py-4 bg-gradient-to-r from-zinc-950 to-zinc-900 dark:from-zinc-200 dark:to-zinc-300 text-white dark:text-zinc-900 rounded-full font-bold shadow-lg apple-spring text-sm uppercase tracking-wider mx-auto block"
                    >
                        {active ? 'Остановить' : 'Начать практику'}
                    </button>
                </div>
            );
        }

        // =================== ПЛЕЕР МЕДИТАЦИИ ===================
        function MeditationPlayerScreen({ session, onClose, onMinimize, onComplete }) {
            const [isPlaying, setIsPlaying] = useState(true);
            const [secondsRemaining, setSecondsRemaining] = useState(session.duration * 60);
            const [isVoiceEnabled, setIsVoiceEnabled] = useState(true);
            const [soundType, setSoundType] = useState(session.sound || 'oriental');
            const [volume, setVolume] = useState(0.04);
            
            const voiceRef = useRef(null);
            const timerRef = useRef(null);
            const completedRef = useRef(false);
            const voiceIdxRef = useRef(0);
            const voiceCooldownRef = useRef(5);
            const voicePlayingRef = useRef(false);
            const voiceDurationRef = useRef(0);

            const totalSeconds = session.duration * 60;
            const elapsedSeconds = totalSeconds - secondsRemaining;
            const progress = totalSeconds > 0 ? (elapsedSeconds / totalSeconds) * 100 : 0;

            useEffect(() => {
                AudioEngine.play(soundType, session.category);
                AudioEngine.setVolume(volume);
                
                voiceRef.current = new Audio();
                voiceRef.current.volume = 0.45;
                const onVoiceEnd = () => {
                    voicePlayingRef.current = false;
                    voiceDurationRef.current = 0;
                    voiceCooldownRef.current = 45;
                };
                voiceRef.current.addEventListener('ended', onVoiceEnd);

                timerRef.current = setInterval(() => {
                    setSecondsRemaining(prev => {
                        if (prev <= 1) {
                            if (!completedRef.current) {
                                completedRef.current = true;
                                clearInterval(timerRef.current);
                                AudioEngine.stop();
                                if (voiceRef.current) voiceRef.current.pause();
                                onComplete(session.duration);
                            }
                            return 0;
                        }
                        
                        // Голосовой гид
                        if (isVoiceEnabled && voiceRef.current) {
                            if (voicePlayingRef.current) {
                                voiceDurationRef.current += 1;
                                if (voiceDurationRef.current >= 20) {
                                    voiceRef.current.pause();
                                    voicePlayingRef.current = false;
                                    voiceDurationRef.current = 0;
                                    voiceCooldownRef.current = 50;
                                }
                            } else if (voiceCooldownRef.current > 0) {
                                voiceCooldownRef.current -= 1;
                            } else {
                                voiceRef.current.src = VOICE_FILES[voiceIdxRef.current];
                                voiceRef.current.load();
                                voiceRef.current.play().then(() => {
                                    voicePlayingRef.current = true;
                                    voiceDurationRef.current = 0;
                                    voiceIdxRef.current = (voiceIdxRef.current + 1) % VOICE_FILES.length;
                                }).catch(() => {});
                            }
                        }
                        
                        return prev - 1;
                    });
                }, 1000);

                return () => {
                    clearInterval(timerRef.current);
                    AudioEngine.stop();
                    if (voiceRef.current) {
                        voiceRef.current.pause();
                        voiceRef.current.removeEventListener('ended', onVoiceEnd);
                    }
                };
            }, []); // eslint-disable-line react-hooks/exhaustive-deps

            useEffect(() => {
                AudioEngine.setVolume(volume);
            }, [volume]);

            useEffect(() => {
                if (isPlaying) {
                    AudioEngine.play(soundType, session.category);
                    AudioEngine.setVolume(volume);
                } else {
                    AudioEngine.stop();
                    if (voiceRef.current) voiceRef.current.pause();
                }
            }, [isPlaying, soundType]); // eslint-disable-line react-hooks/exhaustive-deps

            const formatTime = (s) => {
                const m = Math.floor(Math.max(0, s) / 60);
                const sec = Math.max(0, s) % 60;
                return `${m}:${String(sec).padStart(2, '0')}`;
            };

            const handleClose = () => {
                AudioEngine.stop();
                if (voiceRef.current) voiceRef.current.pause();
                clearInterval(timerRef.current);
                onClose();
            };

            return (
                <div className="fixed inset-0 z-50 bg-[var(--overlay-bg)] backdrop-blur-2xl flex flex-col justify-between p-6 text-center page-transition overflow-y-auto scrollbar-none">
                    <div className="flex items-center justify-between w-full max-w-md mx-auto shrink-0 px-2 relative z-10">
                        <button 
                            onClick={onMinimize} 
                            className="bg-zinc-200/80 dark:bg-zinc-700/80 text-zinc-900 dark:text-zinc-100 px-4 py-2.5 rounded-full text-xs font-bold apple-spring"
                        >
                            Свернуть
                        </button>
                        <div className="text-center truncate max-w-[160px]">
                            <h2 className="font-extrabold text-zinc-900 dark:text-white text-sm truncate">{session.title}</h2>
                            <span className="text-[9px] font-bold text-cyan-600 dark:text-cyan-400 block mt-0.5">{session.category}</span>
                        </div>
                        <button 
                            onClick={handleClose} 
                            className="bg-zinc-900 dark:bg-zinc-200 text-white dark:text-zinc-900 px-5 py-2.5 rounded-full text-xs font-bold apple-spring"
                        >
                            Готово
                        </button>
                    </div>

                    <div className="flex-1 flex flex-col items-center justify-center relative my-6 min-h-[200px] z-10">
                        <div className="w-44 h-44 rounded-full liquid-glass flex flex-col items-center justify-center shadow-md z-10 relative">
                            <span className="text-4xl font-light tabular-nums text-zinc-900 dark:text-white">
                                {formatTime(secondsRemaining)}
                            </span>
                            {isPlaying && (
                                <div className="flex items-end gap-1.5 h-6 mt-3">
                                    <div className="w-1.5 bg-emerald-400 rounded-full eq-bar" style={{height: '100%'}} />
                                    <div className="w-1.5 bg-cyan-400 rounded-full eq-bar" style={{height: '60%', animationDelay: '0.2s'}} />
                                    <div className="w-1.5 bg-teal-500 rounded-full eq-bar" style={{height: '40%', animationDelay: '0.4s'}} />
                                </div>
                            )}
                        </div>
                    </div>

                    <div className="w-full max-w-sm mx-auto space-y-4 shrink-0 relative z-10">
                        <div className="space-y-1">
                            <div className="w-full bg-black/[0.06] dark:bg-white/[0.1] rounded-full h-1.5 overflow-hidden">
                                <div style={{width: `${progress}%`}} className="bg-gradient-to-r from-cyan-500 to-emerald-500 h-full rounded-full transition-all duration-1000" />
                            </div>
                            <div className="flex justify-between text-[11px] font-medium text-zinc-400 dark:text-zinc-500 px-0.5">
                                <span>{formatTime(elapsedSeconds)}</span>
                                <span>{formatTime(totalSeconds)}</span>
                            </div>
                        </div>

                        <div className="flex items-center justify-center">
                            <button 
                                onClick={() => setIsPlaying(!isPlaying)} 
                                className="w-16 h-16 rounded-full bg-gradient-to-r from-zinc-950 to-zinc-900 dark:from-zinc-200 dark:to-zinc-300 text-white dark:text-zinc-900 flex items-center justify-center shadow-lg active:scale-95 transition-transform"
                            >
                                {isPlaying ? (
                                    <svg className="w-6 h-6 fill-current" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                                ) : (
                                    <svg className="w-6 h-6 fill-current ml-0.5" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                                )}
                            </button>
                        </div>

                        <div className="bg-white/90 dark:bg-zinc-800/90 border border-zinc-200/60 dark:border-zinc-700/40 rounded-3xl p-5 space-y-4 shadow-sm backdrop-blur-md">
                            <div>
                                <span className="block text-[9px] font-black text-zinc-400 dark:text-zinc-500 uppercase tracking-wider mb-2.5">Фоновый звук</span>
                                <div className="grid grid-cols-4 gap-1.5 text-[10px] font-bold">
                                    {['oriental', 'bell', 'drone', 'waves', 'rain', 'forest', 'fire', 'wind'].map(snd => (
                                        <button 
                                            key={snd} 
                                            onClick={() => setSoundType(snd)} 
                                            className={`py-2.5 px-1 rounded-xl transition-all border active:scale-95 ${
                                                soundType === snd 
                                                    ? 'bg-zinc-900 dark:bg-zinc-200 text-white dark:text-zinc-900 border-zinc-900 dark:border-zinc-200' 
                                                    : 'bg-zinc-100 dark:bg-zinc-700 text-zinc-600 dark:text-zinc-300 border-transparent hover:bg-zinc-200 dark:hover:bg-zinc-600'
                                            }`}
                                        >
                                            {SOUND_NAMES[snd].split(' ')[0]}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <div>
                                <span className="block text-[9px] font-black text-zinc-400 dark:text-zinc-500 uppercase tracking-wider mb-2">Громкость</span>
                                <input 
                                    type="range" min="0" max="0.1" step="0.01" value={volume}
                                    onChange={(e) => setVolume(parseFloat(e.target.value))} 
                                    className="w-full"
                                />
                            </div>

                            <div className="pt-3 border-t border-zinc-100 dark:border-zinc-700 flex items-center justify-between">
                                <span className="text-xs font-bold text-zinc-800 dark:text-zinc-200">Голосовой гид</span>
                                <button 
                                    onClick={() => setIsVoiceEnabled(!isVoiceEnabled)}
                                    className={`relative inline-flex h-5 w-10 items-center rounded-full transition-colors duration-300 ${isVoiceEnabled ? 'bg-emerald-500' : 'bg-zinc-200 dark:bg-zinc-600'}`}
                                >
                                    <span className={`inline-block h-3 w-3 rounded-full bg-white transition-transform duration-300 ${isVoiceEnabled ? 'translate-x-6' : 'translate-x-1'}`} />
                                </button>
                            </div>
                        </div>
                    </div>

                    <div className="mt-4 shrink-0 max-w-sm mx-auto w-full relative z-10">
                        <DynamicTicker />
                    </div>
                </div>
            );
        }

        // =================== РЕНДЕР ===================
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <PlayerProvider>
                <PremiumZenApp />
            </PlayerProvider>
        );
    </script>
</body>
</html>
